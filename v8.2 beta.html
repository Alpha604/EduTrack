<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>EduTrack Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#080c14;--bg2:#0e1420;--bg3:#141c2e;--bg4:#1a2438;--bg5:#202d45;
  --border:rgba(99,132,255,.15);--border2:rgba(99,132,255,.08);
  --text:#e8eeff;--text2:#8896b3;--text3:#4a5878;
  --primary:#6384ff;--primary2:#4d6ce8;--pdim:rgba(99,132,255,.12);--pglow:rgba(99,132,255,.25);
  --accent:#00e5c3;--adim:rgba(0,229,195,.1);
  --green:#22c55e;--gdim:rgba(34,197,94,.12);
  --yellow:#f59e0b;--ydim:rgba(245,158,11,.12);
  --orange:#f97316;--odim:rgba(249,115,22,.12);
  --red:#ef4444;--rdim:rgba(239,68,68,.12);
  --purple:#a78bfa;--purdim:rgba(167,139,250,.12);
  --pink:#ec4899;--pinkdim:rgba(236,72,153,.12);
  --teal:#06b6d4;--tealdim:rgba(6,182,212,.12);
  --r:10px;--rl:16px;--rxl:24px;
  --shadow:0 8px 32px rgba(0,0,0,.4);--shadow-lg:0 20px 60px rgba(0,0,0,.6);
}
[data-theme="light"]{
  --bg:#f0f4ff;--bg2:#ffffff;--bg3:#f5f7ff;--bg4:#eaedff;--bg5:#e0e5ff;
  --border:rgba(99,132,255,.2);--border2:rgba(99,132,255,.1);
  --text:#0f1729;--text2:#4a5878;--text3:#8896b3;
  --pdim:rgba(99,132,255,.08);--pglow:rgba(99,132,255,.2);
  --adim:rgba(0,229,195,.08);--gdim:rgba(34,197,94,.08);--ydim:rgba(245,158,11,.08);
  --rdim:rgba(239,68,68,.08);--purdim:rgba(167,139,250,.08);
  --shadow:0 4px 20px rgba(99,132,255,.08);--shadow-lg:0 16px 48px rgba(99,132,255,.15);
}
body{font-family:'Sora',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;transition:background .3s,color .3s}

/* LOADER */
#loader{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .5s,visibility .5s}
#loader.out{opacity:0;visibility:hidden;pointer-events:none}
.l-logo{font-size:48px;font-weight:800;letter-spacing:-3px;margin-bottom:6px;background:linear-gradient(135deg,var(--primary),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.l-sub{font-size:13px;color:var(--text3);margin-bottom:32px;font-weight:500;letter-spacing:2px;text-transform:uppercase}
.l-track{width:240px;height:2px;background:var(--bg4);border-radius:2px;overflow:hidden}
.l-fill{height:100%;background:linear-gradient(90deg,var(--primary),var(--accent));border-radius:2px;width:0;transition:width .2s}
.l-status{font-size:12px;color:var(--text3);margin-top:14px;font-family:'JetBrains Mono',monospace}

/* LOGIN */
#loginPage{display:none;min-height:100vh;background:var(--bg);align-items:center;justify-content:center;position:relative;overflow:hidden}
.login-bg{position:absolute;inset:0;pointer-events:none;overflow:hidden}
.login-orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:.15;animation:orb-float 8s ease-in-out infinite}
.login-orb-1{width:600px;height:600px;background:var(--primary);top:-200px;left:-200px}
.login-orb-2{width:500px;height:500px;background:var(--accent);bottom:-150px;right:-150px;animation-delay:3s}
.login-orb-3{width:300px;height:300px;background:var(--purple);top:50%;left:50%;transform:translate(-50%,-50%);animation-delay:1.5s}
@keyframes orb-float{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-20px) scale(1.05)}}
.login-card{position:relative;z-index:1;display:flex;background:var(--bg2);border:1px solid var(--border);border-radius:var(--rxl);width:900px;max-width:96vw;box-shadow:var(--shadow-lg);overflow:hidden;animation:card-in .6s cubic-bezier(.16,1,.3,1)}
@keyframes card-in{from{opacity:0;transform:translateY(30px) scale(.97)}to{opacity:1;transform:none}}
.login-left{flex:0 0 300px;background:linear-gradient(160deg,var(--bg3) 0%,var(--bg) 100%);padding:48px 36px;display:flex;flex-direction:column;justify-content:space-between;border-right:1px solid var(--border);position:relative;overflow:hidden}
.login-left::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 20% 20%,var(--pdim) 0%,transparent 60%),radial-gradient(circle at 80% 80%,var(--adim) 0%,transparent 60%)}
.ll-logo{position:relative}
.ll-icon{width:52px;height:52px;border-radius:14px;background:linear-gradient(135deg,var(--primary),var(--primary2));display:flex;align-items:center;justify-content:center;font-size:22px;color:#fff;margin-bottom:18px;box-shadow:0 8px 24px var(--pglow)}
.ll-logo h1{font-size:26px;font-weight:800;letter-spacing:-1px}
.ll-logo h1 span{background:linear-gradient(135deg,var(--primary),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.ll-logo p{font-size:12px;color:var(--text3);margin-top:6px;font-weight:500}
.ll-stats{position:relative}
.ll-stat{margin-bottom:14px}
.ll-stat .n{font-size:26px;font-weight:800;background:linear-gradient(135deg,var(--text),var(--text2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.ll-stat .l{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;font-weight:600}
.login-right{flex:1;padding:48px 44px;display:flex;flex-direction:column;justify-content:center}
.rtabs{display:flex;gap:5px;background:var(--bg3);padding:4px;border-radius:var(--r);margin-bottom:24px;border:1px solid var(--border2)}
.rtab{flex:1;padding:9px 6px;border:none;border-radius:8px;background:transparent;color:var(--text2);font-family:'Sora',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:6px}
.rtab.active{background:var(--primary);color:#fff;box-shadow:0 4px 14px var(--pglow)}
.login-right h2{font-size:22px;font-weight:800;letter-spacing:-.5px;margin-bottom:4px}
.login-right>p{font-size:13px;color:var(--text2);margin-bottom:18px}
.hint-box{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:10px 14px;margin-bottom:14px;font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text3)}
.hint-box b{color:var(--text2)}
.fi{margin-bottom:13px}
.fi label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.fi input,.fi select{width:100%;padding:11px 15px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);color:var(--text);font-family:'Sora',sans-serif;font-size:14px;transition:all .2s;outline:none}
.fi input:focus,.fi select:focus{border-color:var(--primary);box-shadow:0 0 0 3px var(--pdim);background:var(--bg4)}
.fi select option{background:var(--bg3)}
.login-btn{width:100%;padding:13px;background:linear-gradient(135deg,var(--primary),var(--primary2));color:#fff;border:none;border-radius:var(--r);font-family:'Sora',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all .25s;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 6px 20px var(--pglow)}
.login-btn:hover{transform:translateY(-2px);box-shadow:0 10px 28px var(--pglow)}
.errmsg{background:var(--rdim);border:1px solid var(--red);color:var(--red);padding:10px 14px;border-radius:var(--r);font-size:13px;margin-bottom:12px;display:none;border-left:3px solid var(--red)}

/* APP SHELL */
#app{display:none;min-height:100vh;flex-direction:column}
#app.on{display:flex}
.topbar{height:56px;background:var(--bg2);border-bottom:1px solid var(--border);padding:0 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:300;backdrop-filter:blur(12px)}
.tb-l{display:flex;align-items:center;gap:14px}
.app-logo{font-size:17px;font-weight:800;letter-spacing:-1px;background:linear-gradient(135deg,var(--primary),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.tb-badge{font-size:11px;color:var(--text2);background:var(--bg3);padding:3px 11px;border-radius:20px;border:1px solid var(--border);font-weight:500}
.tb-r{display:flex;align-items:center;gap:8px}
.sync-pill{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;transition:all .3s}
.sp-ok{background:var(--gdim);color:var(--green);border:1px solid rgba(34,197,94,.2)}
.sp-err{background:var(--rdim);color:var(--red);border:1px solid rgba(239,68,68,.2)}
.sp-pend{background:var(--ydim);color:var(--yellow);border:1px solid rgba(245,158,11,.2)}
.tb-icon-btn{width:34px;height:34px;border-radius:var(--r);border:1px solid var(--border);background:var(--bg3);color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all .15s;position:relative}
.tb-icon-btn:hover{border-color:var(--primary);color:var(--primary);background:var(--pdim)}
.tb-icon-btn .notif-dot{position:absolute;top:5px;right:5px;width:7px;height:7px;background:var(--red);border-radius:50%;border:1px solid var(--bg2)}
.save-btn{padding:7px 14px;background:var(--gdim);border:1px solid rgba(34,197,94,.25);color:var(--green);border-radius:var(--r);font-family:'Sora',sans-serif;font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;transition:all .2s}
.save-btn:hover{background:var(--green);color:#000}
.save-btn.busy{opacity:.6;pointer-events:none}
.avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;background:linear-gradient(135deg,var(--primary),var(--primary2));color:#fff;border:2px solid var(--pglow)}
.logout-btn{padding:6px 12px;border:1px solid var(--border);background:transparent;color:var(--text2);border-radius:var(--r);font-family:'Sora',sans-serif;font-size:12px;cursor:pointer;transition:all .15s}
.logout-btn:hover{border-color:var(--red);color:var(--red);background:var(--rdim)}
.app-body{display:flex;flex:1;min-height:0}

/* SIDEBAR */
.sidebar{width:220px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);padding:10px 8px;display:flex;flex-direction:column;gap:1px;position:sticky;top:56px;height:calc(100vh - 56px);overflow-y:auto}
.sb-section{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--text3);padding:10px 12px 4px;margin-top:6px}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 12px;border-radius:var(--r);cursor:pointer;font-size:13px;font-weight:500;color:var(--text2);transition:all .15s;border:none;background:none;width:100%;text-align:left;font-family:'Sora',sans-serif;position:relative}
.nav-item i{width:16px;text-align:center;font-size:13px;flex-shrink:0}
.nav-item:hover{background:var(--pdim);color:var(--text)}
.nav-item.active{background:var(--pdim);color:var(--primary);font-weight:600}
.nav-item.active::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:60%;background:var(--primary);border-radius:0 3px 3px 0}
.nav-badge{margin-left:auto;background:var(--rdim);color:var(--red);font-size:10px;padding:1px 6px;border-radius:10px;font-weight:700}
.nav-badge.blue{background:var(--pdim);color:var(--primary)}
.nav-badge.green{background:var(--gdim);color:var(--green)}

/* MAIN */
.main{flex:1;overflow-x:hidden;padding:22px;min-width:0}

/* COMPONENTS */
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px}
.page-title{font-size:19px;font-weight:800;letter-spacing:-.5px;display:flex;align-items:center;gap:10px}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:18px}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);padding:16px;cursor:default;transition:all .2s;position:relative;overflow:hidden}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--accent);opacity:0;transition:opacity .2s}
.stat-card:hover{border-color:var(--primary);box-shadow:0 4px 20px var(--pdim)}
.stat-card:hover::before{opacity:1}
.sc-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;font-weight:700;margin-bottom:6px}
.sc-val{font-size:28px;font-weight:800;line-height:1;letter-spacing:-1px}
.sc-sub{font-size:11px;color:var(--text2);margin-top:3px}
.sc-icon{position:absolute;right:14px;top:50%;transform:translateY(-50%);font-size:28px;opacity:.12;color:var(--primary)}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);margin-bottom:16px;overflow:hidden}
.card-hdr{padding:14px 18px;border-bottom:1px solid var(--border2);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.card-title{font-size:13px;font-weight:700;display:flex;align-items:center;gap:8px;color:var(--text)}

/* TABLE */
.dt{width:100%;border-collapse:collapse}
.dt thead th{text-align:left;padding:9px 14px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);background:var(--bg3);border-bottom:1px solid var(--border)}
.dt tbody td{padding:10px 14px;border-bottom:1px solid var(--border2);font-size:13px;color:var(--text)}
.dt tbody tr:last-child td{border-bottom:none}
.dt tbody tr:hover td{background:var(--bg3)}

/* BUTTONS */
.btn{padding:8px 14px;border-radius:var(--r);border:1px solid var(--border);background:var(--bg3);color:var(--text);font-family:'Sora',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:6px}
.btn:hover{border-color:var(--text2)}
.btn-p{background:var(--primary);border-color:var(--primary);color:#fff}.btn-p:hover{background:var(--primary2);border-color:var(--primary2)}
.btn-g{background:var(--gdim);border-color:rgba(34,197,94,.25);color:var(--green)}.btn-g:hover{background:var(--green);color:#000}
.btn-r{background:var(--rdim);border-color:rgba(239,68,68,.25);color:var(--red)}.btn-r:hover{background:var(--red);color:#fff}
.btn-a{background:var(--adim);border-color:rgba(0,229,195,.25);color:var(--accent)}
.btn-y{background:var(--ydim);border-color:rgba(245,158,11,.25);color:var(--yellow)}
.btn-sm{padding:4px 9px;font-size:11px;border-radius:7px}
.badge{padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.3px}
.b-blue{background:var(--pdim);color:var(--primary);border:1px solid rgba(99,132,255,.2)}
.b-green{background:var(--gdim);color:var(--green);border:1px solid rgba(34,197,94,.2)}
.b-yellow{background:var(--ydim);color:var(--yellow);border:1px solid rgba(245,158,11,.2)}
.b-red{background:var(--rdim);color:var(--red);border:1px solid rgba(239,68,68,.2)}
.b-purple{background:var(--purdim);color:var(--purple);border:1px solid rgba(167,139,250,.2)}
.b-orange{background:var(--odim);color:var(--orange);border:1px solid rgba(249,115,22,.2)}
.b-accent{background:var(--adim);color:var(--accent);border:1px solid rgba(0,229,195,.2)}
.b-pink{background:var(--pinkdim);color:var(--pink);border:1px solid rgba(236,72,153,.2)}
.b-teal{background:var(--tealdim);color:var(--teal);border:1px solid rgba(6,182,212,.2)}

/* NOTE BADGES */
.nb{display:inline-flex;align-items:center;justify-content:center;padding:3px 10px;border-radius:20px;font-weight:700;font-family:'JetBrains Mono',monospace;font-size:12px;min-width:46px}
.nb-ex{background:rgba(34,197,94,.15);color:#4ade80;border:1px solid rgba(74,222,128,.2)}
.nb-tb{background:rgba(99,132,255,.15);color:#93a8ff;border:1px solid rgba(147,168,255,.2)}
.nb-bi{background:rgba(167,139,250,.15);color:#c4b5fd;border:1px solid rgba(196,181,253,.2)}
.nb-pa{background:rgba(245,158,11,.15);color:#fbbf24;border:1px solid rgba(251,191,36,.2)}
.nb-in{background:rgba(249,115,22,.15);color:#fb923c;border:1px solid rgba(251,146,60,.2)}
.nb-fa{background:rgba(239,68,68,.15);color:#f87171;border:1px solid rgba(248,113,113,.2)}
.nb-ab{background:var(--bg4);color:var(--text3);border:1px solid var(--border2)}
.nb-boost{background:rgba(34,197,94,.2);color:#4ade80;border:2px solid rgba(74,222,128,.4)}
.nb-em{color:var(--text3);font-size:18px}

/* NOTES TABLE */
.nscroll{overflow:auto;border-radius:var(--rl);border:1px solid var(--border);max-height:calc(100vh - 210px)}
.ngrid{border-collapse:separate;border-spacing:0;min-width:max-content;width:100%}
.ngrid thead th{background:var(--bg);border-bottom:1px solid var(--border);padding:8px 9px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);white-space:nowrap;position:sticky;top:0;z-index:20;border-right:1px solid var(--border2)}
.ngrid thead tr:nth-child(2) th{background:var(--bg2);padding:5px 7px;font-size:10px;color:var(--text3);position:sticky;top:36px;z-index:19;border-bottom:1px solid var(--border);border-right:1px solid var(--border2)}
.col-name{position:sticky;left:0;z-index:15;background:var(--bg2);min-width:150px;max-width:150px;font-weight:700!important;border-right:2px solid var(--border)!important}
.col-avg{position:sticky;left:150px;z-index:14;background:var(--bg2);width:72px;text-align:center!important;border-right:2px solid var(--border)!important}
.ngrid thead tr th.col-name{left:0}.ngrid thead tr th.col-avg{left:150px}
.ngrid tbody tr:hover .col-name,.ngrid tbody tr:hover .col-avg{background:var(--bg3)!important}
.ngrid tbody td{padding:0;border-bottom:1px solid var(--border2);border-right:1px solid var(--border2)}
.ngrid tbody td:last-child{border-right:none}
.dh-0{border-top:3px solid #6384ff!important}.dh-1{border-top:3px solid #00e5c3!important}.dh-2{border-top:3px solid #a78bfa!important}
.dh-3{border-top:3px solid #f59e0b!important}.dh-4{border-top:3px solid #ef4444!important}.dh-5{border-top:3px solid #22c55e!important}
.dh-6{border-top:3px solid #ec4899!important}.dh-7{border-top:3px solid #f97316!important}
.dc-0{background:rgba(99,132,255,.04)}.dc-1{background:rgba(0,229,195,.04)}.dc-2{background:rgba(167,139,250,.04)}
.dc-3{background:rgba(245,158,11,.04)}.dc-4{background:rgba(239,68,68,.04)}.dc-5{background:rgba(34,197,94,.04)}
.dc-6{background:rgba(236,72,153,.04)}.dc-7{background:rgba(249,115,22,.04)}
.nc,.ac{cursor:pointer;transition:filter .15s}
.nc:hover{filter:brightness(1.4)}.ac:hover{background:rgba(245,158,11,.1)!important}
.ni{padding:9px 5px;text-align:center;font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:600}
.ai{padding:9px 5px;text-align:center;font-size:14px}
.boost-star{color:var(--green);font-size:10px;vertical-align:super}

/* RANK */
.rank{font-size:11px;font-weight:700;padding:2px 7px;border-radius:12px}
.r1{background:rgba(245,158,11,.2);color:#fbbf24}.r2{background:rgba(139,148,158,.15);color:#94a3b8}
.r3{background:rgba(249,115,22,.2);color:#fb923c}.rn{background:var(--bg3);color:var(--text3)}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(8,12,20,.8);backdrop-filter:blur(8px);z-index:1000;align-items:center;justify-content:center}
.modal-overlay.on{display:flex}
.modal-box{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);width:520px;max-width:95vw;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-lg);animation:card-in .25s ease}
.modal-hdr{padding:18px 22px;border-bottom:1px solid var(--border2);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:var(--bg2);z-index:2}
.modal-hdr h3{font-size:14px;font-weight:700}
.modal-close{width:28px;height:28px;background:var(--bg3);border:none;color:var(--text2);border-radius:8px;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s}
.modal-close:hover{background:var(--rdim);color:var(--red)}
.modal-body{padding:18px 22px}
.modal-footer{padding:14px 22px;border-top:1px solid var(--border2);display:flex;justify-content:flex-end;gap:8px;position:sticky;bottom:0;background:var(--bg2)}
.mf{margin-bottom:14px}
.mf label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text2);margin-bottom:6px}
.mf input,.mf select,.mf textarea{width:100%;padding:10px 13px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);color:var(--text);font-family:'Sora',sans-serif;font-size:13px;outline:none;transition:all .2s}
.mf input:focus,.mf select:focus,.mf textarea:focus{border-color:var(--primary);box-shadow:0 0 0 3px var(--pdim)}
.mf textarea{min-height:80px;resize:vertical}
.mf select option{background:var(--bg3)}
.mf-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.mf-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}

/* SEARCH */
.search-wrap{position:relative;margin-bottom:14px}
.search-wrap i{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:13px}
.search-wrap input{width:100%;padding:9px 13px 9px 36px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);color:var(--text);font-family:'Sora',sans-serif;font-size:13px;outline:none}
.search-wrap input:focus{border-color:var(--primary);box-shadow:0 0 0 3px var(--pdim)}

/* TOAST */
#toasts{position:fixed;bottom:20px;right:20px;display:flex;flex-direction:column;gap:7px;z-index:9999}
.toast{background:var(--bg2);border:1px solid var(--border);padding:12px 18px;border-radius:var(--r);font-size:13px;color:var(--text);box-shadow:var(--shadow);animation:t-in .3s ease;max-width:320px;display:flex;align-items:center;gap:10px}
.toast-ok{border-left:3px solid var(--green)}.toast-err{border-left:3px solid var(--red)}.toast-warn{border-left:3px solid var(--yellow)}
@keyframes t-in{from{transform:translateX(16px);opacity:0}to{transform:none;opacity:1}}

/* PERIOD TABS */
.period-tabs{display:flex;gap:6px;margin-bottom:16px}
.period-tab{padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text2);font-family:'Sora',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s}
.period-tab.active{background:var(--primary);border-color:var(--primary);color:#fff}

/* AGENDA */
.agenda-item{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:10px 14px;margin-bottom:6px;display:flex;align-items:center;gap:12px;transition:all .2s}
.agenda-item.done{opacity:.5}
.agenda-item:hover{border-color:var(--primary)}
.agenda-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.agenda-content{flex:1}
.agenda-title{font-size:13px;font-weight:600;margin-bottom:2px}
.agenda-meta{font-size:11px;color:var(--text3)}
.agenda-check{cursor:pointer;font-size:16px;color:var(--text3);transition:.15s}
.agenda-check:hover{color:var(--green)}

/* CT */
.ct-item{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);padding:16px 18px;margin-bottom:8px;transition:all .2s}
.ct-item:hover{border-color:var(--primary)}
.ct-header{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:8px}
.ct-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.ct-body{font-size:13px;color:var(--text2);line-height:1.6}
.ct-hw{margin-top:10px;padding:10px 14px;background:var(--ydim);border-left:3px solid var(--yellow);border-radius:0 var(--r) var(--r) 0;font-size:13px}
.ct-hw .hw-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--yellow);margin-bottom:4px}

/* NOTIF */
.notif-item{display:flex;align-items:flex-start;gap:12px;padding:14px 16px;border-bottom:1px solid var(--border2);cursor:pointer;transition:background .15s}
.notif-item:last-child{border-bottom:none}
.notif-item:hover{background:var(--bg3)}
.notif-item.unread{background:var(--pdim)}
.notif-icon{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.notif-text{flex:1}
.notif-title{font-size:13px;font-weight:600;margin-bottom:2px}
.notif-body{font-size:12px;color:var(--text2)}
.notif-time{font-size:11px;color:var(--text3);margin-top:3px}

/* CHART */
.chart-wrap{padding:16px;height:220px;position:relative}

/* DEVOIRS LIST */
.devoirs-list .dcard{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);padding:13px 16px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;transition:all .2s}
.devoirs-list .dcard:hover{border-color:var(--primary);box-shadow:0 4px 16px var(--pdim)}
.dcard-l{display:flex;align-items:center;gap:14px}
.ddate{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:7px 10px;text-align:center;font-family:'JetBrains Mono',monospace;min-width:50px}
.ddate .dd{font-size:17px;font-weight:700}.ddate .dm{font-size:10px;color:var(--text3)}
.dinfo h4{font-size:13px;font-weight:700;margin-bottom:3px}.dinfo p{font-size:12px;color:var(--text2)}

/* EMPTY */
.empty{text-align:center;padding:48px;color:var(--text3)}
.empty i{font-size:36px;display:block;margin-bottom:10px;opacity:.5}

/* ELEVE CARDS (améliorées) */
.note-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:14px 16px;transition:all .25s;position:relative;overflow:hidden}
.note-card:hover{border-color:var(--primary);transform:translateY(-2px);box-shadow:0 8px 24px var(--pdim)}
.note-card-top{width:100%;height:3px;border-radius:3px 3px 0 0;position:absolute;top:0;left:0}
.note-val{font-size:28px;font-weight:800;font-family:'JetBrains Mono',monospace;line-height:1;margin:8px 0 4px}
.note-label{font-size:11px;color:var(--text3)}
.note-appr{font-size:11px;color:var(--text2);font-style:italic;margin-top:5px;padding-top:5px;border-top:1px solid var(--border2)}

/* PROGRESS BAR */
.prog-bar{background:var(--bg3);border-radius:6px;height:8px;overflow:hidden;margin-top:5px}
.prog-fill{height:100%;border-radius:6px;transition:width .6s cubic-bezier(.16,1,.3,1)}

/* MESSAGE THREAD */
.msg-item{padding:14px 16px;border-bottom:1px solid var(--border2);cursor:pointer;transition:background .15s}
.msg-item:hover{background:var(--bg3)}
.msg-item.unread{background:var(--pdim);border-left:3px solid var(--primary)}
.msg-bubble{background:var(--bg3);border-radius:12px;padding:12px 14px;margin:6px 0;font-size:13px;line-height:1.6}
.msg-bubble.mine{background:var(--pdim);border:1px solid rgba(99,132,255,.2)}

/* PARENT specific */
.parent-header{background:linear-gradient(135deg,#1a1040 0%,var(--bg) 100%);border:1px solid rgba(167,139,250,.2);border-radius:var(--rl);padding:20px 24px;margin-bottom:20px;position:relative;overflow:hidden}
.parent-header::before{content:'';position:absolute;top:-40px;right:-40px;width:160px;height:160px;background:var(--purple);border-radius:50%;filter:blur(60px);opacity:.15}
.score-ring{width:80px;height:80px;flex-shrink:0;position:relative}
.score-ring svg{transform:rotate(-90deg)}
.score-ring .ring-val{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;font-family:'JetBrains Mono',monospace}
.alert-item{display:flex;align-items:flex-start;gap:12px;padding:12px 14px;border-radius:var(--r);margin-bottom:8px;border:1px solid}
.alert-warn{background:var(--ydim);border-color:rgba(245,158,11,.25)}
.alert-ok{background:var(--gdim);border-color:rgba(34,197,94,.25)}
.alert-err{background:var(--rdim);border-color:rgba(239,68,68,.25)}
.alert-info{background:var(--pdim);border-color:rgba(99,132,255,.25)}

/* SCROLLBAR */
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--bg5);border-radius:2px}
input[type=number]::-webkit-inner-spin-button{opacity:.4}
input[type=date]{color-scheme:dark}
[data-theme="light"] input[type=date]{color-scheme:light}

/* QUICK-ACTION GRID */
.qa-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:18px}
.qa-btn{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);padding:16px 12px;display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;transition:all .2s;text-align:center}
.qa-btn:hover{border-color:var(--primary);background:var(--pdim);transform:translateY(-2px)}
.qa-btn i{font-size:20px}
.qa-btn span{font-size:11px;font-weight:600;color:var(--text2)}

/* Styles pour la messagerie */
.msg-bubble {
    background: var(--bg3);
    border-radius: 12px;
    padding: 12px 14px;
    margin: 6px 0;
    font-size: 13px;
    line-height: 1.6;
    word-break: break-word;
}

.msg-bubble.mine {
    background: var(--pdim);
    border: 1px solid rgba(99,132,255,.2);
}

.conversation-item {
    transition: background 0.15s ease;
}

.conversation-item:hover {
    background: var(--bg3) !important;
}

/* Styles améliorés pour la messagerie */
.conversation-item {
    transition: all 0.2s ease;
    border-radius: 12px;
    margin: 4px 8px;
}

.conversation-item:hover {
    background: var(--bg3) !important;
    transform: translateX(2px);
}

.conversation-avatar {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    font-size: 18px;
    color: white;
    flex-shrink: 0;
}

.conversation-avatar.prof {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
}

.conversation-avatar.eleve {
    background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
}

.conversation-avatar.parent {
    background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
}

.conversation-preview {
    flex: 1;
    min-width: 0;
}

.conversation-name {
    font-weight: 600;
    font-size: 15px;
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
}

.conversation-last-msg {
    font-size: 12px;
    color: var(--text2);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.conversation-time {
    font-size: 10px;
    color: var(--text3);
    white-space: nowrap;
}

.conversation-unread {
    width: 20px;
    height: 20px;
    background: var(--primary);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: bold;
    color: white;
}

.message-bubble {
    max-width: 75%;
    position: relative;
    animation: messageAppear 0.2s ease;
}

.message-bubble.mine {
    margin-left: auto;
}

.message-bubble.theirs {
    margin-right: auto;
}

.message-content {
    padding: 10px 14px;
    border-radius: 18px;
    word-wrap: break-word;
    font-size: 13px;
    line-height: 1.5;
}

.message-content.mine {
    background: var(--primary);
    color: white;
    border-bottom-right-radius: 4px;
}

.message-content.theirs {
    background: var(--bg3);
    border-bottom-left-radius: 4px;
}

.message-meta {
    font-size: 10px;
    color: var(--text3);
    margin-top: 4px;
    display: flex;
    align-items: center;
    gap: 8px;
}

.message-mine {
    justify-content: flex-end;
}

.message-theirs {
    justify-content: flex-start;
}

.message-attachment {
    margin-top: 8px;
    padding: 8px 12px;
    background: rgba(255,255,255,0.1);
    border-radius: 12px;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    transition: all 0.2s;
}

.message-attachment:hover {
    background: rgba(255,255,255,0.2);
}

.message-attachment i {
    font-size: 20px;
}

.message-attachment-name {
    font-size: 11px;
    max-width: 200px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
}

.typing-indicator {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 6px 12px;
    background: var(--bg3);
    border-radius: 16px;
    font-size: 11px;
    color: var(--text2);
    margin-bottom: 8px;
}

.typing-dot {
    width: 6px;
    height: 6px;
    background: var(--primary);
    border-radius: 50%;
    animation: typingBounce 1.4s infinite;
}

.typing-dot:nth-child(2) { animation-delay: 0.2s; }
.typing-dot:nth-child(3) { animation-delay: 0.4s; }

@keyframes typingBounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-4px); }
}

@keyframes messageAppear {
    from {
        opacity: 0;
        transform: translateY(10px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.message-actions {
    display: flex;
    gap: 4px;
    margin-top: 4px;
    justify-content: flex-end;
    opacity: 0;
    transition: opacity 0.2s;
}

.message-bubble:hover .message-actions {
    opacity: 1;
}

.message-action-btn {
    background: transparent;
    border: none;
    color: var(--text3);
    cursor: pointer;
    font-size: 11px;
    padding: 2px 6px;
    border-radius: 8px;
    transition: all 0.2s;
}

.message-action-btn:hover {
    background: var(--bg4);
    color: var(--primary);
}

.quick-replies {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid var(--border2);
}

.quick-reply {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 6px 12px;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.2s;
}

.quick-reply:hover {
    background: var(--primary);
    border-color: var(--primary);
    color: white;
}

.message-search {
    margin-bottom: 16px;
    position: relative;
}

.message-search i {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text3);
}

.message-search input {
    width: 100%;
    padding: 10px 12px 10px 36px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--r);
    color: var(--text);
    font-size: 13px;
}

.message-search input:focus {
    border-color: var(--primary);
    outline: none;
}

.pinned-message {
    background: var(--ydim);
    border-left: 3px solid var(--yellow);
    padding: 8px 12px;
    border-radius: 8px;
    margin-bottom: 12px;
    font-size: 12px;
    cursor: pointer;
}

.emoji-picker {
    position: absolute;
    bottom: 100%;
    left: 0;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 8px;
    display: none;
    grid-template-columns: repeat(6, 1fr);
    gap: 6px;
    z-index: 100;
    margin-bottom: 8px;
    box-shadow: var(--shadow);
}

.emoji-picker.show {
    display: grid;
}

.emoji-picker span {
    font-size: 20px;
    cursor: pointer;
    text-align: center;
    padding: 6px;
    border-radius: 8px;
    transition: all 0.2s;
}

.emoji-picker span:hover {
    background: var(--bg3);

}

.message-input-wrapper {

.message-input-actions {

    gap: 6px;
    align-items: center;
}

.message-input-btn {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: var(--bg3);
    border: 1px solid var(--border);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    color: var(--text2);

.message-input-btn:hover {
    background: var(--primary);
    border-color: var(--primary);
    color: white;

    background: var(--yellow);
    border-color: var(--yellow);

function doLogin(){
  const pwd = document.getElementById('l-pwd').value.trim();
  showErr('');
  if(!pwd) return showErr('Saisissez votre mot de passe.');
  
  if(loginRole === 'prof') {
    const email = document.getElementById('l-email').value.trim();
    if(!email) return showErr('Saisissez votre email.');
    if(email === D.prof.email && pwd === D.prof.mdp) {
      sessionStorage.setItem('edu_sess', JSON.stringify({role:'prof'}));
      loginAsProf();
    } else {
      showErr('Email ou mot de passe incorrect.');
    }
  } 
  else if(loginRole === 'eleve') {
    const eId = parseInt(document.getElementById('s-eleve').value);
    const elv = D.eleves.find(e => e.id === eId);
    if(!elv) return showErr('Sélectionnez votre profil.');
    if(elv.mdp && pwd === elv.mdp) {
      sessionStorage.setItem('edu_sess', JSON.stringify({role:'eleve', id:eId}));
      loginAsEleve(eId);
    } else {
      showErr('Mot de passe incorrect.');
    }
  } 
  else if(loginRole === 'parent') {
    const eId = parseInt(document.getElementById('s-parent').value);
    const elv = D.eleves.find(e => e.id === eId);
    if(!elv) return showErr('Sélectionnez votre enfant.');
    if(elv.parentMdp && pwd === elv.parentMdp) {
      sessionStorage.setItem('edu_sess', JSON.stringify({role:'parent', id:eId}));
      loginAsParent(eId);
    } else {
      showErr('Mot de passe incorrect.');
    }
  } 
  else if(loginRole === 'admin') {
    const email = document.getElementById('l-email').value.trim();
    if(!email) return showErr('Saisissez votre email.');
    if(email === D.admin.email && pwd === D.admin.mdp) {
      sessionStorage.setItem('edu_sess', JSON.stringify({role:'admin'}));
      loginAsAdmin();
    } else {
      showErr('Email ou mot de passe incorrect.');
    }
  }
}

function calcMoy(eId,period,excludeBoost=false){
  let ns=D.notes.filter(n=>n.eleveId===eId&&typeof n.valeur==='number');
  if(period){const dids=D.devoirs.filter(d=>d.periode===period).map(d=>d.id);ns=ns.filter(n=>dids.includes(n.devoirId));}
  // Exclure les notes "boost uniquement si elles aident" qui ne font pas monter
  if(!excludeBoost){
    ns=ns.filter(n=>{
      const nObj=D.notes.find(x=>x.eleveId===eId&&x.devoirId===n.devoirId);
      if(!nObj||!nObj.boostOnly)return true;
      // Calcul sans cette note pour voir si elle aide
      const nsWithout=D.notes.filter(x=>x.eleveId===eId&&typeof x.valeur==='number'&&!(x.devoirId===n.devoirId&&x.boostOnly));
      if(!nsWithout.length)return true;
      let t2=0,c2=0;nsWithout.forEach(x=>{const d=D.devoirs.find(d=>d.id===x.devoirId);if(d){t2+=x.valeur*d.coeff;c2+=d.coeff;}});
      const moyWithout=c2?t2/c2:0;
      let t=0,c=0;ns.forEach(x=>{const d=D.devoirs.find(d=>d.id===x.devoirId);if(d){t+=x.valeur*d.coeff;c+=d.coeff;}});
      const moyWith=c?t/c:0;
      return moyWith>=moyWithout;
    });
  }
  if(!ns.length)return null;
  let t=0,c=0;ns.forEach(n=>{const d=D.devoirs.find(d=>d.id===n.devoirId);if(d){t+=n.valeur*d.coeff;c+=d.coeff;}});
  return c?parseFloat((t/c).toFixed(2)):null;
}
function nCls(v){if(v===null||v==='Abs'||v===undefined)return'nb-ab';const n=parseFloat(v);if(n>=18)return'nb-ex';if(n>=15)return'nb-tb';if(n>=12)return'nb-bi';if(n>=10)return'nb-pa';if(n>=7)return'nb-in';return'nb-fa';}
function nBadge(v,lbl){
  if(v===null||v===undefined)return'<span class="nb nb-em">·</span>';
  if(v==='Abs')return'<span class="nb nb-ab">Abs</span>';
  return`<span class="nb ${nCls(v)}">${lbl!==undefined?lbl:v}</span>`;
}
function nColor(v){const n=parseFloat(v);if(n>=18)return'#4ade80';if(n>=15)return'#93a8ff';if(n>=12)return'#c4b5fd';if(n>=10)return'#fbbf24';if(n>=7)return'#fb923c';return'#f87171';}

function ci(i){return i%8;}
function fn2(eId,dId){return D.notes.find(n=>n.eleveId===eId&&n.devoirId===dId)||null;}
function sortDev(period){let devs=[...D.devoirs];if(period&&period!=='all')devs=devs.filter(d=>d.periode===period);return devs.sort((a,b)=>{const pa=a.date.split('/'),pb=b.date.split('/');return(parseInt(pa[1])*100+parseInt(pa[0]))-(parseInt(pb[1])*100+parseInt(pb[0]));});}
function mois(dm){return['Jan','Fév','Mar','Avr','Mai','Jun','Jul','Aoû','Sep','Oct','Nov','Déc'][parseInt(dm)-1]||dm;}
function nid(arr){return arr.length?Math.max(...arr.map(x=>x.id))+1:1;}
function esc(s){return(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function todayStr(){const d=new Date();return`${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}`;}
function todayISO(){const d=new Date();return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function isoToFr(iso){if(!iso)return'';const[y,m,d]=iso.split('-');return`${d}/${m}`;}
function frToISO(fr){if(!fr)return todayISO();const[d,m]=fr.split('/');const y=new Date().getFullYear();return`${y}-${(m||'01').padStart(2,'0')}-${(d||'01').padStart(2,'0')}`;}
function dateInput(id,valFr=''){const iso=valFr?frToISO(valFr):todayISO();return`<input type="date" id="${id}" value="${iso}">`;}
function getDateFr(id){const el=document.getElementById(id);if(!el)return todayStr();return el.value?isoToFr(el.value):todayStr();}

  const r=30,cx=40,cy=40,circ=2*Math.PI*r,pct=Math.min(val/max,1),dash=pct*circ;

}

function editNote(eId,dId){

    </div>

      <select id="mn-t" onchange="document.getElementById('mn-vwrap').style.display=this.value==='note'?'':'none';updateBoostPreview()">
        ${d.note?`<option value="note" ${!isAbs&&!noNote?'selected':''}>📝 Note chiffrée /20</option>`:''}

        <option value="nd" ${noNote||!d.note?'selected':''}>⬜ Non noté</option>
      </select>
    </div>
    ${d.note?`
    <div id="mn-vwrap" style="${isAbs||noNote?'display:none':''}">
      <div class="mf-row">
        <div class="mf"><label>Note (0–20)</label><input type="number" id="mn-v" step="0.5" min="0" max="20" value="${n&&typeof n.valeur==='number'?n.valeur:''}" placeholder="ex: 13.5" oninput="updateBoostPreview()" onkeydown="if(event.key==='Enter')document.getElementById('m-confirm').click()"></div>
        <div class="mf"><label>Mode</label>
          <select id="mn-boost" onchange="updateBoostPreview()">
            <option value="0" ${!n?.boostOnly?'selected':''}>Comptée normalement</option>
            <option value="1" ${n?.boostOnly?'selected':''}>⭐ Bonus si ça aide</option>
          </select>
        </div>
      </div>
      <div id="boost-preview" style="background:var(--bg3);border-radius:var(--r);padding:9px 12px;font-size:12px;color:var(--text2);margin-bottom:12px;display:none"></div>
    </div>`:'<div id="mn-vwrap" style="display:none"><input type="hidden" id="mn-v"><input type="hidden" id="mn-boost" value="0"></div>'}
    <div class="mf"><label>Appréciation <span style="font-weight:400;color:var(--text3)">(optionnel)</span></label>
      <textarea id="mn-a" placeholder="Bon travail..." rows="2">${esc(n?.appreciation||'')}</textarea>
    </div>
    <div style="margin-top: 12px; padding: 10px; background: var(--rdim); border-radius: var(--r);">
      <button type="button" class="btn btn-r btn-sm" style="width: 100%;" onclick="deleteNote(${eId}, ${dId})">
        <i class="fas fa-trash"></i> Supprimer cette note
      </button>

  `,()=>{
    const type=document.getElementById('mn-t').value;

    }
    markUnsaved();navigate('notes');toast('✅ Note enregistrée');
  });

  setTimeout(()=>{
    window._boostPreviewData={eId,dId,periode:d.periode};
    updateBoostPreview();
  },50);
}

// Ajoutez cette fonction pour supprimer une note
function deleteNote(eId, dId) {
  if (!confirm('Supprimer définitivement cette note ?')) return;
  D.notes = D.notes.filter(x => !(x.eleveId === eId && x.devoirId === dId));
  markUnsaved();
  navigate('notes');
  toast('🗑️ Note supprimée');
  closeModal();
}
function updateBoostPreview(){
  const bd=window._boostPreviewData;if(!bd)return;
  const wrap=document.getElementById('boost-preview');if(!wrap)return;
  const boost=document.getElementById('mn-boost')?.value==='1';
  const valRaw=parseFloat(document.getElementById('mn-v')?.value);
  if(isNaN(valRaw)||!boost){wrap.style.display='none';return;}
  // Calcul moy sans ce devoir
  const nsWithout=D.notes.filter(n=>n.eleveId===bd.eId&&typeof n.valeur==='number'&&n.devoirId!==bd.dId);
  const devsP=D.devoirs.filter(d=>d.periode===bd.periode);
  const nsP=nsWithout.filter(n=>devsP.map(d=>d.id).includes(n.devoirId));
  let t=0,c=0;nsP.forEach(n=>{const dv=D.devoirs.find(d=>d.id===n.devoirId);if(dv){t+=n.valeur*dv.coeff;c+=dv.coeff;}});
  const moyBefore=c?parseFloat((t/c).toFixed(2)):null;
  // Avec
  const dv=D.devoirs.find(d=>d.id===bd.dId);
  let t2=t+(valRaw*(dv?.coeff||1)),c2=c+(dv?.coeff||1);
  const moyAfter=parseFloat((t2/c2).toFixed(2));
  const helps=moyAfter>=(moyBefore||0);
  wrap.style.display='block';
  wrap.innerHTML=helps
    ?`<span style="color:var(--green)">✅ Cette note <strong>améliore</strong> ta moyenne : ${moyBefore||'—'} → <strong>${moyAfter}/20</strong></span>`
    :`<span style="color:var(--orange)">⚠️ Cette note <strong>n'améliore pas</strong> la moyenne (${moyBefore} → ${moyAfter}). Elle sera ignorée.</span>`;
}

function editAppr(eId,dId){
  const e=D.eleves.find(el=>el.id===eId),d=D.devoirs.find(dv=>dv.id===dId);
  const n=fn2(eId,dId);
  openModal(`Appréciation — ${e.prenom} ${e.nom} · ${d.titre}`,`
    <div class="mf"><label>Appréciation</label><textarea id="ma-v">${esc(n?.appreciation||'')}</textarea></div>

    markUnsaved();navigate('notes');toast('Appréciation enregistrée');
  });
}

function rAbsences(){
  const absences = D.absences || [];
  
  // Grouper les absences par date
  const absencesParDate = {};
  absences.forEach(a => {
    if (!absencesParDate[a.date]) absencesParDate[a.date] = [];
    absencesParDate[a.date].push(a);
  });
  
  // Trier les dates du plus récent au plus ancien
  const datesTriees = Object.keys(absencesParDate).sort((a,b) => {
    const [da, ma] = a.split('/');
    const [db, mb] = b.split('/');
    return (parseInt(mb)*100 + parseInt(db)) - (parseInt(ma)*100 + parseInt(da));
  });
  
  const totalAbsences = absences.length;
  const justifiees = absences.filter(a => a.type === 'justifiée').length;
  const injustifiees = absences.filter(a => a.type === 'injustifiée').length;
  const retards = absences.filter(a => a.type === 'retard').length;
  const dispenses = absences.filter(a => a.type === 'dispense').length;
  
  return `
  <div class="page-header">
    <div class="page-title">
      <i class="fas fa-user-xmark" style="color:var(--red)"></i> 
      Gestion des absences
    </div>
    <button class="btn btn-p" onclick="ouvrirAppel()">
      <i class="fas fa-clipboard-list"></i> Faire l'appel
    </button>
  </div>
  
  <div class="stat-grid" style="margin-bottom: 20px;">
    <div class="stat-card">
      <div class="sc-icon"><i class="fas fa-chart-line"></i></div>
      <div class="sc-label">Total absences</div>
      <div class="sc-val">${totalAbsences}</div>
    </div>
    <div class="stat-card">
      <div class="sc-icon"><i class="fas fa-check-circle"></i></div>
      <div class="sc-label">Justifiées</div>
      <div class="sc-val" style="color:var(--green)">${justifiees}</div>
    </div>
    <div class="stat-card">
      <div class="sc-icon"><i class="fas fa-clock"></i></div>
      <div class="sc-label">Retards</div>
      <div class="sc-val" style="color:var(--orange)">${retards}</div>
    </div>
    <div class="stat-card">
      <div class="sc-icon"><i class="fas fa-times-circle"></i></div>
      <div class="sc-label">Injustifiées</div>
      <div class="sc-val" style="color:var(--red)">${injustifiees}</div>
    </div>
  </div>
  
  <div class="card">
    <div class="card-hdr">
      <div class="card-title"><i class="fas fa-history"></i> Historique des appels</div>
      ${totalAbsences > 0 ? `<button class="btn btn-sm btn-r" onclick="supprimerToutesAbsences()" style="color:var(--red)">
        <i class="fas fa-trash"></i> Tout effacer
      </button>` : ''}
    </div>
    <div style="padding: 0;">
      ${datesTriees.length === 0 ? 
        '<div class="empty"><i class="fas fa-check-circle" style="color:var(--green)"></i>Aucune absence enregistrée 🎉</div>' :
        datesTriees.map(date => {
          const absDuJour = absencesParDate[date];
          const justifieesJour = absDuJour.filter(a => a.type === 'justifiée').length;
          const injustifieesJour = absDuJour.filter(a => a.type === 'injustifiée').length;
          const retardsJour = absDuJour.filter(a => a.type === 'retard').length;
          const dispensesJour = absDuJour.filter(a => a.type === 'dispense').length;
          const titreCours = absDuJour[0]?.titreCours || '';
          const horaire = absDuJour[0]?.horaire || '';
          
          return `
            <div style="border-bottom: 1px solid var(--border2);">
              <div style="padding: 12px 16px; background: var(--bg3); display: flex; justify-content: space-between; align-items: center; cursor: pointer;" onclick="toggleDateAbsences('${date}')">
                <div style="display: flex; align-items: center; gap: 12px; flex-wrap: wrap;">
                  <i class="fas fa-chevron-right" id="chevron-${date.replace(/\//g, '-')}" style="transition: transform 0.2s;"></i>
                  <strong style="font-size: 14px;">📅 ${date}</strong>
                  ${horaire ? `<span class="badge b-blue" style="font-size: 11px;">🕐 ${horaire}</span>` : ''}
                  ${titreCours ? `<span style="font-size: 12px; color: var(--text2);">${esc(titreCours)}</span>` : ''}
                </div>
                <div style="display: flex; gap: 8px; flex-wrap: wrap;">
                  ${justifieesJour > 0 ? `<span class="badge b-green">✅ ${justifieesJour}</span>` : ''}
                  ${retardsJour > 0 ? `<span class="badge b-orange">⏰ ${retardsJour}</span>` : ''}
                  ${dispensesJour > 0 ? `<span class="badge b-purple">📝 ${dispensesJour}</span>` : ''}
                  ${injustifieesJour > 0 ? `<span class="badge b-red">❌ ${injustifieesJour}</span>` : ''}
                  <span class="badge b-purple">👥 ${absDuJour.length}</span>
                </div>
              </div>
              <div id="absences-${date.replace(/\//g, '-')}" style="display: none; padding: 12px 16px;">
                ${absDuJour[0]?.commentaire ? `
                  <div style="background: var(--pdim); padding: 10px; border-radius: var(--r); margin-bottom: 12px;">
                    <i class="fas fa-comment"></i> <strong>Observations :</strong> ${esc(absDuJour[0].commentaire)}
                  </div>
                ` : ''}
                <table class="dt" style="width: 100%;">
                  <thead>
                    <tr><th>Élève</th><th>Type</th><th>Motif</th><th style="width: 80px;">Action</th></tr>
                  </thead>
                  <tbody>
                    ${absDuJour.map(a => {
                      const eleve = D.eleves.find(e => e.id === a.eleveId);

//  PROF : STATS
// ══════════════════════════════════════════
function rStats(){
  const cl=[...D.eleves].map(e=>({...e,m:calcMoy(e.id)})).filter(e=>e.m!==null).sort((a,b)=>b.m-a.m);
  const ms=cl.map(e=>e.m);
  const moy=ms.length?(ms.reduce((a,b)=>a+b,0)/ms.length).toFixed(2):'—';
  const dist=[0,0,0,0,0,0];
  D.eleves.forEach(e=>{const m=calcMoy(e.id);if(m===null)return;if(m>=18)dist[0]++;else if(m>=15)dist[1]++;else if(m>=12)dist[2]++;else if(m>=10)dist[3]++;else if(m>=7)dist[4]++;else dist[5]++;});
  const pd=sortDev().map(d=>{const ns=D.notes.filter(n=>n.devoirId===d.id&&typeof n.valeur==='number');const m=ns.length?(ns.reduce((a,b)=>a+b.valeur,0)/ns.length).toFixed(1):null;return{d,m,cnt:ns.length};});
  const html=`
  <div class="page-header"><div class="page-title"><i class="fas fa-chart-line" style="color:var(--accent)"></i> Statistiques</div></div>
  <div class="stat-grid">
    <div class="stat-card"><div class="sc-label">Moy. classe</div><div class="sc-val" style="color:var(--primary)">${moy}</div><div class="sc-sub">/20</div></div>
    <div class="stat-card"><div class="sc-label">Meilleure note</div><div class="sc-val">${ms.length?Math.max(...ms):'—'}</div></div>
    <div class="stat-card"><div class="sc-label">Plus faible</div><div class="sc-val">${ms.length?Math.min(...ms):'—'}</div></div>
    <div class="stat-card"><div class="sc-label">Classés</div><div class="sc-val">${cl.length}<span style="font-size:14px;color:var(--text2)">/${D.eleves.length}</span></div></div>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px">
    <div class="card"><div class="card-hdr"><div class="card-title"><i class="fas fa-chart-bar" style="color:var(--primary)"></i> Distribution</div></div>
      <div style="padding:14px 16px">
        ${[{l:'≥18 Excellent',v:dist[0],c:'#4ade80'},{l:'15-18 Très bien',v:dist[1],c:'#93a8ff'},{l:'12-15 Bien',v:dist[2],c:'#c4b5fd'},{l:'10-12 Passable',v:dist[3],c:'#fbbf24'},{l:'7-10 Insuffisant',v:dist[4],c:'#fb923c'},{l:'<7 Très insuffisant',v:dist[5],c:'#f87171'}].map(b=>`
        <div style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px"><span style="color:var(--text2)">${b.l}</span><span style="font-family:'JetBrains Mono',monospace;font-weight:700;color:${b.c}">${b.v}</span></div>
        <div style="background:var(--bg3);border-radius:3px;height:5px;overflow:hidden"><div style="width:${Math.max(...dist,1)?b.v/Math.max(...dist,1)*100:0}%;height:100%;background:${b.c};border-radius:3px"></div></div></div>`).join('')}
      </div>
    </div>
    <div class="card"><div class="card-hdr"><div class="card-title"><i class="fas fa-chart-line" style="color:var(--green)"></i> Évolution par devoir</div></div>
      <div style="padding:16px;height:220px;position:relative"><canvas id="cht-devoirs"></canvas></div>
    </div>
  </div>
  <div class="card"><div class="card-hdr"><div class="card-title"><i class="fas fa-trophy" style="color:var(--yellow)"></i> Classement complet</div></div>
    <table class="dt"><thead><tr><th>#</th><th>Élève</th><th>T1</th><th>T2</th><th>T3</th><th>Moy. générale</th><th>Mention</th></tr></thead><tbody>
    ${cl.map((e,i)=>`<tr><td><span class="rank ${i<3?'r'+(i+1):'rn'}">${i+1}</span></td><td><strong>${e.nom}</strong> ${e.prenom}</td>
      <td>${nBadge(calcMoy(e.id,'T1'),calcMoy(e.id,'T1'))}</td><td>${nBadge(calcMoy(e.id,'T2'),calcMoy(e.id,'T2'))}</td><td>${nBadge(calcMoy(e.id,'T3'),calcMoy(e.id,'T3'))}</td>
      <td>${nBadge(e.m,e.m+'/20')}</td><td style="font-size:12px;color:var(--text2)">${mention(e.m)}</td></tr>`).join('')}
    </tbody></table>
  </div>`;
  window._chartDeferred=()=>{
    const ctx=document.getElementById('cht-devoirs');if(!ctx||!pd.length)return;
    const c=new Chart(ctx,{type:'line',data:{labels:pd.map(x=>x.d.titre),datasets:[{label:'Moy. classe',data:pd.map(x=>x.m?parseFloat(x.m):null),borderColor:'#6384ff',backgroundColor:'rgba(99,132,255,.1)',tension:.4,fill:true,pointBackgroundColor:'#6384ff',pointRadius:4,spanGaps:true}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#8896b3',font:{family:'Sora',size:11}}}},scales:{x:{ticks:{color:'#8896b3'},grid:{color:'rgba(255,255,255,.04)'}},y:{min:0,max:20,ticks:{color:'#8896b3'},grid:{color:'rgba(255,255,255,.04)'}}}}});
    activeCharts.push(c);
  };
  return html;
}

function rExports(){
  return`

    <div class="card" style="padding:20px;text-align:center"><i class="fas fa-print" style="font-size:32px;color:var(--purple);display:block;margin-bottom:10px"></i><h4 style="margin-bottom:7px">Imprimer</h4><p style="font-size:12px;color:var(--text2);margin-bottom:13px">Page actuelle</p><button class="btn" style="width:100%;border-color:var(--purple);color:var(--purple)" onclick="window.print()"><i class="fas fa-print"></i> Imprimer</button></div>
    <div class="card" style="padding:20px;text-align:center"><i class="fas fa-file-pdf" style="font-size:32px;color:var(--red);display:block;margin-bottom:10px"></i><h4 style="margin-bottom:7px">Bulletins PDF</h4><p style="font-size:12px;color:var(--text2);margin-bottom:13px">Tous les bulletins</p><button class="btn btn-r" style="width:100%" onclick="exportAllBulletins()"><i class="fas fa-file-pdf"></i> Générer</button></div>
  </div>`;
}
function exportCSV(){
  const devs=sortDev();
  const rows=[['Élève',...devs.map(d=>d.titre+' ('+d.periode+')'),'T1','T2','T3','Moy. générale']];
  [...D.eleves].sort((a,b)=>a.nom.localeCompare(b.nom)).forEach(e=>{
    const row=[`${e.nom} ${e.prenom}`];devs.forEach(d=>{const n=fn2(e.id,d.id);row.push(n&&n.valeur!==null?n.valeur:'');});
    row.push(calcMoy(e.id,'T1')||'',calcMoy(e.id,'T2')||'',calcMoy(e.id,'T3')||'',calcMoy(e.id)||'');rows.push(row);
  });
  const csv=rows.map(r=>r.map(c=>`"${c}"`).join(',')).join('\n');
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8'}));a.download='notes_classe.csv';a.click();toast('CSV téléchargé');
}
function exportJSON(){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(D,null,2)],{type:'application/json'}));a.download='edutrack_data.json';a.click();toast('JSON téléchargé');}
function exportAllBulletins(){D.eleves.forEach(e=>['T1','T2','T3'].forEach(p=>printBulletin(e.id,p)));toast('Bulletins ouverts');}

function rEAgenda() {
  const e = currentUser;
  const taches = getTachesPourEleve(e.id, 'all');
  const stats = getStatsAgenda(e.id);
  
  // Regrouper par statut
  const aFaire = taches.filter(t => !t.estFait && !t.estEnRetard);
  const enRetard = taches.filter(t => t.estEnRetard);
  const faits = taches.filter(t => t.estFait);
  
  return `
  <div class="page-header">
    <div class="page-title">
      <i class="fas fa-calendar-check" style="color:var(--accent)"></i> 
      Mon agenda
    </div>
    <div style="display: flex; gap: 8px;">
      <button class="btn btn-sm" onclick="ajouterTachePersonnelle()" title="Ajouter une tâche personnelle">
        <i class="fas fa-plus"></i> Tâche perso
      </button>
      <button class="btn btn-sm" onclick="exporterAgenda()" title="Exporter mon agenda">
        <i class="fas fa-download"></i> Exporter
      </button>
    </div>
  </div>
  
  <!-- Statistiques -->
  <div class="stat-grid">
    <div class="stat-card">
      <div class="sc-icon"><i class="fas fa-tasks"></i></div>
      <div class="sc-label">Total tâches</div>
      <div class="sc-val">${stats.total}</div>
    </div>
    <div class="stat-card">
      <div class="sc-icon"><i class="fas fa-check-circle" style="color:var(--green)"></i></div>
      <div class="sc-label">Terminées</div>
      <div class="sc-val" style="color:var(--green)">${stats.faits}</div>
    </div>
    <div class="stat-card">
      <div class="sc-icon"><i class="fas fa-hourglass-half" style="color:var(--yellow)"></i></div>
      <div class="sc-label">À faire</div>
      <div class="sc-val" style="color:var(--yellow)">${stats.aFaire}</div>
    </div>
    <div class="stat-card" style="${stats.enRetard > 0 ? 'border-color:var(--red)' : ''}">
      <div class="sc-icon"><i class="fas fa-exclamation-triangle" style="color:var(--red)"></i></div>
      <div class="sc-label">En retard</div>
      <div class="sc-val" style="${stats.enRetard > 0 ? 'color:var(--red)' : ''}">${stats.enRetard}</div>
    </div>
  </div>
  
  <!-- Barre de progression -->
  <div class="card" style="margin-bottom: 20px;">
    <div class="card-hdr">
      <div class="card-title"><i class="fas fa-chart-line"></i> Progression</div>
    </div>
    <div style="padding: 12px 16px;">
      <div style="display: flex; justify-content: space-between; margin-bottom: 6px;">
        <span style="font-size: 12px;">Tâches terminées</span>
        <span style="font-size: 12px; font-weight: 600;">${stats.pourcentage}%</span>
      </div>
      <div class="prog-bar">
        <div class="prog-fill" style="width: ${stats.pourcentage}%; background: var(--green);"></div>
      </div>
    </div>
  </div>
  
  <!-- Filtres -->
  <div style="display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap;">
    <div class="search-wrap" style="flex: 1;">
      <i class="fas fa-search"></i>
      <input type="text" id="agenda-search" placeholder="Rechercher..." oninput="filtrerAgenda()">
    </div>
    <select id="agenda-filtre-type" onchange="filtrerAgenda()" style="padding: 8px 12px; border-radius: var(--r); background: var(--bg3);">
      <option value="all">📋 Tous</option>
      <option value="devoir">📝 Devoirs</option>
      <option value="travail">📚 Travaux</option>
      <option value="personnel">✨ Personnel</option>
    </select>
    <select id="agenda-filtre-priorite" onchange="filtrerAgenda()" style="padding: 8px 12px; border-radius: var(--r); background: var(--bg3);">
      <option value="all">⭐ Priorités</option>
      <option value="high">🔴 Haute</option>
      <option value="medium">🟠 Moyenne</option>
      <option value="low">🟢 Basse</option>

  </div>
  
  <!-- Tâches en retard (alerte) -->
  ${enRetard.length > 0 ? `
  <div class="card" style="background: var(--rdim); border-color: var(--red); margin-bottom: 16px;">
    <div class="card-hdr">
      <div class="card-title"><i class="fas fa-clock" style="color:var(--red)"></i> ⚠️ Tâches en retard (${enRetard.length})</div>

    <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 12px;">

      <h3 style="font-size: 14px; font-weight: 700;">📋 À faire (${aFaire.length})</h3>
    </div>
    <div id="agenda-a-faire-list" class="agenda-list">
      ${aFaire.length === 0 ? '<div class="empty">🎉 Rien à faire pour le moment !</div>' : aFaire.map(tache => renderTacheAgenda(tache, e.id)).join('')}
    </div>
  </div>
  
  <!-- Tâches terminées (pliable) -->
  ${faits.length > 0 ? `
  <div>
    <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 12px; cursor: pointer;" onclick="toggleSectionTerminees()">
      <i id="terminees-chevron" class="fas fa-chevron-right"></i>
      <h3 style="font-size: 14px; font-weight: 700;">✅ Terminées (${faits.length})</h3>

    <div id="agenda-terminees-list" style="display: none;">
      ${faits.map(tache => renderTacheAgenda(tache, e.id, true)).join('')}
    </div>
  </div>
  ` : ''}
  `;
}

function renderTacheAgenda(tache, eleveId, isCompleted = false) {
  const prioriteIcon = getPrioriteIcon(tache.priorite);
  const typeIcons = { devoir: '📝', travail: '📚', personnel: '✨' };
  const typeIcon = typeIcons[tache.type] || '📋';
  const isOverdue = tache.estEnRetard && !tache.estFait;
  
  // Formulaire de commentaire pour les devoirs
  let commentaireHtml = '';
  if (tache.type === 'devoir' && tache.commentaire) {
    commentaireHtml = `<div style="font-size: 11px; color: var(--text3); margin-top: 4px;">💬 Commentaire: "${esc(tache.commentaire)}"</div>`;
  }
  
  return `
  <div class="agenda-item ${isCompleted ? 'done' : ''} ${isOverdue ? 'overdue' : ''}" 
       data-type="${tache.type}" 
       data-priorite="${tache.priorite}" 
       data-search="${tache.titre} ${tache.description}"
       data-id="${tache.id}"
       style="${isOverdue ? 'border-left: 3px solid var(--red); background: var(--rdim);' : ''}">
    <div class="agenda-dot" style="background: ${tache.estFait ? 'var(--green)' : (isOverdue ? 'var(--red)' : 'var(--yellow)')};"></div>
    <div class="agenda-content" style="flex: 1;">
      <div class="agenda-title" style="${tache.estFait ? 'text-decoration: line-through; opacity: 0.7;' : ''}">
        ${typeIcon} ${esc(tache.titre)}
        <span class="badge ${tache.priorite === 'high' ? 'b-red' : (tache.priorite === 'medium' ? 'b-yellow' : 'b-green')}" style="margin-left: 8px;">
          ${prioriteIcon} ${getPrioriteLabel(tache.priorite)}
        </span>
        ${tache.periode ? `<span class="badge b-purple">${tache.periode}</span>` : ''}
        ${isOverdue ? `<span class="badge b-red">⏰ En retard !</span>` : ''}
      </div>
      ${tache.description ? `<div style="font-size: 12px; color: var(--text2); margin-top: 4px;">${esc(tache.description)}</div>` : ''}
      ${commentaireHtml}
      <div class="agenda-meta" style="margin-top: 6px;">
        <i class="fas fa-calendar-alt"></i> ${formatDateWithDay(tache.date)}
      </div>
    </div>
    <div style="display: flex; gap: 8px; align-items: center;">
      ${tache.type === 'personnel' ? `
        <button class="agenda-check" onclick="modifierTachePersonnelle('${tache.originalId}')" title="Modifier">
          <i class="fas fa-pen" style="font-size: 14px;"></i>
        </button>
        <button class="agenda-check" onclick="supprimerTachePersonnelle('${tache.originalId}')" title="Supprimer">
          <i class="fas fa-trash" style="font-size: 14px; color: var(--red);"></i>
        </button>
      ` : ''}
      ${tache.type === 'devoir' ? `
        <div class="agenda-check" onclick="ouvrirModalDevoir(${eleveId}, ${tache.originalId}, '${tache.titre}')" title="Marquer comme fait/non fait">
          <i class="fas ${tache.estFait ? 'fa-check-circle' : 'fa-circle'}" style="color: ${tache.estFait ? 'var(--green)' : 'var(--text3)'}; font-size: 20px;"></i>
        </div>
      ` : `
        <div class="agenda-check" onclick="basculerTacheAgenda('${tache.id}', ${tache.originalId}, '${tache.type}')">
          <i class="fas ${tache.estFait ? 'fa-check-circle' : 'fa-circle'}" style="color: ${tache.estFait ? 'var(--green)' : 'var(--text3)'}; font-size: 20px;"></i>
        </div>
      `}
    </div>
  </div>`;
}


function ajouterTachePersonnelle() {
  openModal('➕ Ajouter une tâche personnelle', `
    <div class="mf"><label>Titre</label><input id="perso-titre" type="text" placeholder="Ex: Réviser le chapitre 3" autofocus></div>
    <div class="mf"><label>Description (optionnel)</label><textarea id="perso-desc" rows="2" placeholder="Détails..."></textarea></div>
    <div class="mf-row">
      <div class="mf"><label>Date limite</label><input type="date" id="perso-date" value="${todayISO()}"></div>
      <div class="mf"><label>Priorité</label>
        <select id="perso-priorite">
          <option value="low">🟢 Basse</option>
          <option value="medium" selected>🟠 Moyenne</option>
          <option value="high">🔴 Haute</option>
        </select>
      </div>
    </div>
  `, () => {
    const titre = document.getElementById('perso-titre').value.trim();
    if (!titre) return toast('Titre requis', 'err');
    
    if (!D.taches_personnelles) D.taches_personnelles = [];
    
    D.taches_personnelles.push({
      id: nid(D.taches_personnelles),
      eleveId: currentUser.id,
      titre: titre,
      description: document.getElementById('perso-desc').value,
      date: isoToFr(document.getElementById('perso-date').value),
      priorite: document.getElementById('perso-priorite').value,
      status: 'a_faire',
      createdBy: currentRole,
      createdAt: todayStr()
    });
    
    markUnsaved();
    navigate('e_agenda');
    toast('✅ Tâche personnelle ajoutée');
  });
}

function modifierTachePersonnelle(taskId) {
  const tache = D.taches_personnelles.find(t => t.id === taskId);
  if (!tache) return;
  
  openModal('✏️ Modifier la tâche', `
    <div class="mf"><label>Titre</label><input id="perso-titre" type="text" value="${esc(tache.titre)}"></div>
    <div class="mf"><label>Description</label><textarea id="perso-desc" rows="2">${esc(tache.description || '')}</textarea></div>
    <div class="mf-row">
      <div class="mf"><label>Date limite</label><input type="date" id="perso-date" value="${frToISO(tache.date)}"></div>
      <div class="mf"><label>Priorité</label>
        <select id="perso-priorite">
          <option value="low" ${tache.priorite === 'low' ? 'selected' : ''}>🟢 Basse</option>
          <option value="medium" ${tache.priorite === 'medium' ? 'selected' : ''}>🟠 Moyenne</option>
          <option value="high" ${tache.priorite === 'high' ? 'selected' : ''}>🔴 Haute</option>
        </select>
      </div>
    </div>
  `, () => {
    tache.titre = document.getElementById('perso-titre').value.trim();
    tache.description = document.getElementById('perso-desc').value;
    tache.date = isoToFr(document.getElementById('perso-date').value);
    tache.priorite = document.getElementById('perso-priorite').value;
    
    markUnsaved();
    navigate('e_agenda');
    toast('✅ Tâche modifiée');
  });
}

function supprimerTachePersonnelle(taskId) {
  if (!confirm('Supprimer cette tâche ?')) return;
  D.taches_personnelles = D.taches_personnelles.filter(t => t.id !== taskId);
  markUnsaved();
  navigate('e_agenda');
  toast('🗑️ Tâche supprimée');
}

function basculerTacheAgenda(itemId, originalId, type) {
  if (type === 'personnel') {
    const tache = D.taches_personnelles.find(t => t.id === originalId);
    if (tache) {
      tache.status = tache.status === 'fait' ? 'a_faire' : 'fait';
      markUnsaved();
      navigate('e_agenda');
      toast(tache.status === 'fait' ? '✅ Tâche terminée !' : '🔄 Tâche remise en cours');
    }
  } else if (type === 'travail') {
    const e = currentUser;
    if (!e.doneAgenda) e.doneAgenda = [];
    const idx = e.doneAgenda.indexOf(originalId);
    if (idx >= 0) e.doneAgenda.splice(idx, 1);
    else e.doneAgenda.push(originalId);
    
    const elv = D.eleves.find(el => el.id === e.id);
    if (elv) {
      if (!elv.doneAgenda) elv.doneAgenda = [];
      const i = elv.doneAgenda.indexOf(originalId);
      if (i >= 0) elv.doneAgenda.splice(i, 1);
      else elv.doneAgenda.push(originalId);
    }
    markUnsaved();
    navigate('e_agenda');
    toast(idx >= 0 ? '🔄 Tâche décochée' : '✅ Travail terminé !');
  }
}

function ouvrirModalDevoir(eleveId, devoirId, titreDevoir) {
  const statutActuel = getDevoirStatut(eleveId, devoirId);
  const commentaire = getDevoirCommentaire(eleveId, devoirId);
  
  openModal(`📝 Devoir: ${titreDevoir}`, `
    <div style="background: var(--bg3); border-radius: var(--r); padding: 12px; margin-bottom: 16px;">
      <div style="display: flex; align-items: center; gap: 8px;">
        <i class="fas fa-info-circle" style="color: var(--primary);"></i>
        <span style="font-size: 13px;">Statut actuel: <strong>${statutActuel === 'fait' ? '✅ Fait' : (statutActuel === 'en_retard' ? '⚠️ En retard' : '⏳ À faire')}</strong></span>
      </div>
    </div>
    
    <div class="mf">
      <label>Statut du devoir</label>
      <select id="devoir-statut" style="padding: 10px; width: 100%; border-radius: var(--r); background: var(--bg3);">
        <option value="fait" ${statutActuel === 'fait' ? 'selected' : ''}>✅ Fait - J'ai rendu mon devoir</option>
        <option value="a_faire" ${statutActuel === 'a_faire' ? 'selected' : ''}>⏳ En cours - Je travaille dessus</option>
        <option value="non_fait" ${statutActuel === 'non_fait' ? 'selected' : ''}>❌ Non fait - Je n'ai pas pu le faire</option>
      </select>
    </div>
    
    <div class="mf">
      <label>Commentaire (optionnel)</label>
      <textarea id="devoir-commentaire" rows="3" placeholder="Ajoutez un commentaire pour le professeur...">${esc(commentaire)}</textarea>
    </div>
  `, () => {
    const nouveauStatut = document.getElementById('devoir-statut').value;
    const nouveauCommentaire = document.getElementById('devoir-commentaire').value;
    setDevoirFait(eleveId, devoirId, nouveauStatut, nouveauCommentaire);
    navigate('e_agenda');
    toast(`✅ Devoir marqué comme ${nouveauStatut === 'fait' ? 'fait' : (nouveauStatut === 'non_fait' ? 'non fait' : 'en cours')}`);
  });
}

function filtrerAgenda() {
  const searchTerm = document.getElementById('agenda-search')?.value.toLowerCase() || '';
  const typeFiltre = document.getElementById('agenda-filtre-type')?.value || 'all';
  const prioriteFiltre = document.getElementById('agenda-filtre-priorite')?.value || 'all';
  
  const items = document.querySelectorAll('.agenda-item');
  items.forEach(item => {
    const itemType = item.dataset.type;
    const itemPriorite = item.dataset.priorite;
    const itemSearch = item.dataset.search?.toLowerCase() || '';
    
    let show = true;
    if (typeFiltre !== 'all' && itemType !== typeFiltre) show = false;
    if (prioriteFiltre !== 'all' && itemPriorite !== prioriteFiltre) show = false;
    if (searchTerm && !itemSearch.includes(searchTerm)) show = false;
    
    item.style.display = show ? '' : 'none';
  });
}

function reinitialiserFiltresAgenda() {
  const search = document.getElementById('agenda-search');
  const type = document.getElementById('agenda-filtre-type');
  const priorite = document.getElementById('agenda-filtre-priorite');
  if (search) search.value = '';
  if (type) type.value = 'all';
  if (priorite) priorite.value = 'all';
  filtrerAgenda();
}

function toggleSectionTerminees() {
  const list = document.getElementById('agenda-terminees-list');
  const chevron = document.getElementById('terminees-chevron');
  if (list) {
    if (list.style.display === 'none') {
      list.style.display = 'block';
      if (chevron) chevron.style.transform = 'rotate(90deg)';
    } else {
      list.style.display = 'none';
      if (chevron) chevron.style.transform = 'rotate(0deg)';
    }
  }
}

  const enfant = currentUser;
  const taches = getTachesPourEleve(enfant.id, 'all');

  const aFaire = taches.filter(t => !t.estFait && !t.estEnRetard);
  const enRetard = taches.filter(t => t.estEnRetard);

  return `
  <div class="page-header">
    <div class="page-title">
      <i class="fas fa-calendar" style="color:var(--purple)"></i> 
      Agenda de ${enfant.prenom}

    <button class="btn btn-sm" onclick="exporterAgendaEnfant()" title="Exporter l'agenda">

        📅
      </div>
      <div>

      </div>
      <div style="margin-left: auto; text-align: center;">
        <div class="score-ring">${scoreRingSVG(stats.faits, stats.total, '#a78bfa', 60)}</div>
        <div style="font-size: 12px; font-weight: 600;">${stats.pourcentage}%</div>
      </div>

  </div>
  
  <!-- Alertes -->

    <div class="stat-card"><div class="sc-label">✨ Personnel</div><div class="sc-val">${taches.filter(t => t.type === 'personnel' && !t.estFait).length}</div><div class="sc-sub">en attente</div></div>
  </div>

// Fonctions utilitaires
function getPriority(item) {
  if (item.travail && (item.travail.includes('urgent') || item.travail.includes('important'))) return 'high';
  if (item.titre && (item.titre.includes('contrôle') || item.titre.includes('examen'))) return 'high';
  return 'medium';
}

function getDevoirPriority(devoir) {
  if (devoir.type === 'Contrôle' || devoir.type === 'Devoir commun') return 'high';
  if (devoir.type === 'Interrogation') return 'medium';
  return 'low';
}

function getPriorityLabel(priority) {
  const labels = { high: 'Haute', medium: 'Moyenne', low: 'Basse' };
  return labels[priority] || 'Moyenne';
}

function formatDateWithDay(dateStr) {
  const [day, month] = dateStr.split('/');
  const date = new Date();
  date.setDate(parseInt(day));
  date.setMonth(parseInt(month) - 1);
  const days = ['Dimanche', 'Lundi', 'Mardi', 'Mercredi', 'Jeudi', 'Vendredi', 'Samedi'];
  return `${dateStr} (${days[date.getDay()]})`;
}

function compareDates(dateA, dateB) {
  const [dA, mA] = dateA.split('/');
  const [dB, mB] = dateB.split('/');
  return (parseInt(mA)*100 + parseInt(dA)) - (parseInt(mB)*100 + parseInt(dB));
}

function isDateFuture(dateStr) {
  const [day, month] = dateStr.split('/');
  const today = new Date();
  const d = new Date();
  d.setDate(parseInt(day));
  d.setMonth(parseInt(month) - 1);
  d.setFullYear(today.getFullYear());
  return d >= today.setHours(0,0,0,0);
}

function isDatePast(dateStr) {
  const [day, month] = dateStr.split('/');
  const today = new Date();
  const d = new Date();
  d.setDate(parseInt(day));
  d.setMonth(parseInt(month) - 1);
  d.setFullYear(today.getFullYear());
  return d < today.setHours(0,0,0,0);
}

function toggleAgendaItem(eventId, originalId, type) {
  const e = currentUser;
  if (!e.doneAgenda) e.doneAgenda = [];
  
  if (type === 'personal') {
    // Pour les tâches personnelles
    const tasks = JSON.parse(localStorage.getItem(`personal_tasks_${e.id}`) || '[]');
    const taskIndex = tasks.findIndex(t => t.id === eventId);
    if (taskIndex !== -1) {
      tasks[taskIndex].isDone = !tasks[taskIndex].isDone;
      localStorage.setItem(`personal_tasks_${e.id}`, JSON.stringify(tasks));
    }
  } else {
    // Pour les tâches du système
    const idx = e.doneAgenda.indexOf(originalId);
    if (idx >= 0) e.doneAgenda.splice(idx, 1);
    else e.doneAgenda.push(originalId);
    
    // Sauvegarder dans l'élève
    const elv = D.eleves.find(el => el.id === e.id);
    if (elv) {
      if (!elv.doneAgenda) elv.doneAgenda = [];
      const i = elv.doneAgenda.indexOf(originalId);
      if (i >= 0) elv.doneAgenda.splice(i, 1);
      else elv.doneAgenda.push(originalId);
    }
  }
  
  markUnsaved();
  navigate('e_agenda');
  
  // Notification de félicitations si toutes les tâches sont faites
  const allTasks = getCurrentTasksCount(e.id);
  const doneTasks = getDoneTasksCount(e.id);
  if (doneTasks === allTasks && allTasks > 0) {
    toast('🎉 Félicitations ! Toutes vos tâches sont terminées !', 'ok');
  }
}

function getCurrentTasksCount(eleveId) {
  const cahierCount = (D.cahier || []).filter(ct => ct.travail).length;
  const devoirsCount = sortDev().filter(d => !fn2(eleveId, d.id) && d.note).length;
  const personalCount = JSON.parse(localStorage.getItem(`personal_tasks_${eleveId}`) || '[]').length;
  return cahierCount + devoirsCount + personalCount;
}

function getDoneTasksCount(eleveId) {
  const e = D.eleves.find(el => el.id === eleveId);
  const doneAgenda = e?.doneAgenda || [];
  const personalTasks = JSON.parse(localStorage.getItem(`personal_tasks_${eleveId}`) || '[]');
  const personalDone = personalTasks.filter(t => t.isDone).length;
  return doneAgenda.length + personalDone;
}

function filterAgenda() {
  const searchTerm = document.getElementById('agenda-search')?.value.toLowerCase() || '';
  const typeFilter = document.getElementById('agenda-filter-type')?.value || 'all';
  const priorityFilter = document.getElementById('agenda-filter-priority')?.value || 'all';
  
  const items = document.querySelectorAll('.agenda-item');
