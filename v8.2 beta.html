function openWhatsappConversation(convId) {
    if (!convId) return;
    
    currentWhatsappConvId = convId;
    markConversationRead(convId);
    
    const chatArea = document.getElementById('whatsapp-chat-area');
    if (chatArea) {
        chatArea.innerHTML = renderWhatsappChat(convId);
    }
    
    // Mettre à jour la liste des conversations
    const conversationsList = document.getElementById('whatsapp-conversations-list');
    if (conversationsList) {
        const conversations = getUserConversationsList();
        conversationsList.innerHTML = renderWhatsappConversationsList(conversations);
    }
    
    // Scroll vers le dernier message
    setTimeout(() => {
        const messagesEnd = document.getElementById('whatsapp-messages-end');
        if (messagesEnd) messagesEnd.scrollIntoView({ behavior: 'smooth' });
        const input = document.getElementById('whatsapp-input');
        if (input) input.focus();
    }, 100);
}

function sendWhatsappMessage() {
    const input = document.getElementById('whatsapp-input');
    if (!input?.value.trim()) return;
    
    if (sendMessageTo(currentWhatsappConvId, input.value)) {
        input.value = '';
        autoResizeWhatsappInput(input);
        openWhatsappConversation(currentWhatsappConvId);
        toast('✅ Message envoyé');
    } else {
        toast('❌ Erreur d\'envoi', 'err');
    }
}

function sendWhatsappTypingIndicator() {
    if (whatsappTypingTimeout) clearTimeout(whatsappTypingTimeout);
    if (!whatsappIsTyping) {
        whatsappIsTyping = true;
        const typingStatus = document.getElementById('whatsapp-typing-status');
        if (typingStatus) typingStatus.innerHTML = 'En train d\'écrire...';
    }
    
    whatsappTypingTimeout = setTimeout(() => {
        whatsappIsTyping = false;
        const typingStatus = document.getElementById('whatsapp-typing-status');
        const conv = D.conversations.find(c => c.id === currentWhatsappConvId);
        if (typingStatus && conv) {
            const otherId = conv.participants.find(p => p !== currentUser.id);
            const other = getParticipantInfo(otherId);
            typingStatus.innerHTML = other?.role === 'prof' ? 'Enseignant' : other?.role === 'parent' ? 'Parent' : 'Élève';
        }
    }, 1500);
}

function autoResizeWhatsappInput(textarea) {
    if (textarea) {
        textarea.style.height = 'auto';
        textarea.style.height = Math.min(textarea.scrollHeight, 100) + 'px';
    }
}

function toggleWhatsappEmojiPicker() {
    const picker = document.getElementById('whatsapp-emoji-picker');
    if (picker) picker.classList.toggle('show');
}

function addWhatsappEmoji(emoji) {
    const input = document.getElementById('whatsapp-input');
    if (input) {
        input.value += emoji;
        input.focus();
        autoResizeWhatsappInput(input);
        toggleWhatsappEmojiPicker();
    }
}

function insertWhatsappQuickReply(text) {
    const input = document.getElementById('whatsapp-input');
    if (input) {
        input.value = text;
        input.focus();
        autoResizeWhatsappInput(input);
    }
}

function replyToWhatsappMessage(messageId) {
    const msg = D.messages_conv.find(m => m.id === messageId);
    if (msg && msg.content) {
        const input = document.getElementById('whatsapp-input');
        if (input) {
            input.value = `> ${msg.content.substring(0, 80)}${msg.content.length > 80 ? '...' : ''}\n\n`;
            input.focus();
            autoResizeWhatsappInput(input);
            toast('💬 Réponse préparée');
        }
    }
}

function attachWhatsappFile() {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = 'image/*,.pdf,.doc,.docx,.txt';
    input.multiple = true;
    input.onchange = async (e) => {
        const files = Array.from(e.target.files);
        const attachments = [];
        
        for (const file of files) {
            const reader = new FileReader();
            const attachment = await new Promise((resolve) => {
                reader.onload = (e) => {
                    resolve({
                        name: file.name,
                        type: file.type,
                        size: file.size,
                        data: e.target.result,
                        preview: file.type.startsWith('image/') ? e.target.result : null
                    });
                };
                reader.readAsDataURL(file);
            });
            attachments.push(attachment);
        }
        
        if (attachments.length > 0 && currentWhatsappConvId) {
            sendMessageWithAttachment(currentWhatsappConvId, '', attachments);
            openWhatsappConversation(currentWhatsappConvId);
            toast(`📎 ${attachments.length} fichier(s) attaché(s)`);
        }
    };
    input.click();
}

function searchInWhatsappChat() {
    const searchTerm = prompt('Rechercher dans la conversation:', '');
    if (!searchTerm) return;
    
    const messages = document.querySelectorAll('.whatsapp-message');
    let foundCount = 0;
    
    messages.forEach(msg => {
        const text = msg.querySelector('.whatsapp-message-text')?.innerText || '';
        if (text.toLowerCase().includes(searchTerm.toLowerCase())) {
            msg.style.backgroundColor = 'var(--ydim)';
            msg.style.borderRadius = '12px';
            msg.scrollIntoView({ behavior: 'smooth', block: 'center' });
            foundCount++;
            setTimeout(() => {
                msg.style.backgroundColor = '';
            }, 2000);
        } else {
            msg.style.backgroundColor = '';
        }
    });
    
    if (foundCount === 0) toast('Aucun résultat', 'info');
    else toast(`🔍 ${foundCount} résultat(s) trouvé(s)`);
}

function filterWhatsappConversations(searchTerm) {
    const convs = document.querySelectorAll('.whatsapp-conversation');
    const term = searchTerm.toLowerCase();
    
    convs.forEach(conv => {
        const name = conv.querySelector('.whatsapp-conv-name')?.innerText.toLowerCase() || '';
        const lastMsg = conv.querySelector('.whatsapp-conv-lastmsg')?.innerText.toLowerCase() || '';
        
        if (name.includes(term) || lastMsg.includes(term)) {
            conv.style.display = '';
        } else {
            conv.style.display = 'none';
        }
    });
}

function startWhatsappConversation() {
    let options = [];
    
    if (currentRole === 'prof') {
        // Ajouter les élèves
        options.push(...D.eleves.map(e => ({ 
            id: e.id, 
            name: `${e.nom} ${e.prenom}`, 
            role: 'eleve', 
            avatar: '👨‍🎓',
            displayName: `${e.prenom} ${e.nom}`
        })));
        
        // Ajouter les parents
        D.eleves.forEach(e => {
            if (e.parentNom || e.parentPrenom) {
                const parentName = `${e.parentPrenom || ''} ${e.parentNom || e.nom}`.trim();
                if (parentName) {
                    options.push({ 
                        id: e.id, 
                        name: parentName, 
                        role: 'parent', 
                        avatar: '👨‍👩‍👧',
                        displayName: parentName
                    });
                }
            }
        });
        
        // Ajouter les autres professeurs
        if (D.professeurs) {
            options.push(...D.professeurs.map(p => ({ 
                id: p.id, 
                name: `Prof. ${p.prenom} ${p.nom}`, 
                role: 'prof', 
                avatar: '👨‍🏫',
                displayName: `Prof. ${p.prenom} ${p.nom}`
            })));
        }
    } 
    else if (currentRole === 'eleve') {
        options.push({ 
            id: D.prof.id, 
            name: `Prof. ${D.prof.prenom} ${D.prof.nom}`, 
            role: 'prof', 
            avatar: '👨‍🏫',
            displayName: `Prof. ${D.prof.prenom} ${D.prof.nom}`
        });
        
        // Ajouter d'autres élèves de la classe
        const otherEleves = D.eleves.filter(e => e.id !== currentUser.id);
        options.push(...otherEleves.map(e => ({ 
            id: e.id, 
            name: `${e.nom} ${e.prenom}`, 
            role: 'eleve', 
            avatar: '👨‍🎓',
            displayName: `${e.prenom} ${e.nom}`
        })));
    }
    else if (currentRole === 'parent') {
        options.push({ 
            id: D.prof.id, 
            name: `Prof. ${D.prof.prenom} ${D.prof.nom}`, 
            role: 'prof', 
            avatar: '👨‍🏫',
            displayName: `Prof. ${D.prof.prenom} ${D.prof.nom}`
        });
    }
    
    // Filtrer les contacts déjà en conversation
    const existingIds = getUserConversationsList().flatMap(c => c.participants || []);
    const available = options.filter(opt => !existingIds.includes(opt.id));
    
    if (available.length === 0) {
        toast('Aucun nouveau contact disponible', 'info');
        return;
    }
    
    openModal('💬 Nouvelle conversation', `
        <div class="mf"><label>Destinataire</label>
            <select id="new-conv-dest" style="padding: 12px; width: 100%;">
                ${available.map(opt => `<option value="${opt.id}" data-role="${opt.role}">${opt.avatar} ${opt.name}</option>`).join('')}
            </select>
        </div>
        <div class="mf"><label>Message</label>
            <textarea id="new-conv-msg" rows="4" placeholder="Bonjour..."></textarea>
        </div>
        <div class="whatsapp-quick-replies" style="margin-top: 8px;">
            ${(whatsappQuickTemplates[currentRole] || whatsappQuickTemplates.eleve).slice(0, 3).map(reply => `
                <span class="whatsapp-quick-reply" onclick="document.getElementById('new-conv-msg').value = '${reply.replace(/'/g, "\\'")}'">
                    ${reply}
                </span>
            `).join('')}
        </div>
    `, () => {
        const destId = parseInt(document.getElementById('new-conv-dest').value);
        const content = document.getElementById('new-conv-msg').value.trim();
        if (!content) return toast('Message vide', 'err');
        
        const conv = getOrCreateConversation(currentUser.id, destId, '');
        if (sendMessageTo(conv.id, content)) {
            toast('✅ Conversation démarrée');
            currentWhatsappConvId = conv.id;
            navigate('conversations');
            setTimeout(() => openWhatsappConversation(conv.id), 300);
        } else {
            toast('❌ Erreur', 'err');
        }
    });
}

// Initialisation des structures de données si absentes
if (!D.conversations) D.conversations = [];
if (!D.messages_conv) D.messages_conv = [];

function getOrCreateConversation(currentUserId, targetUserId, targetName) {
    if (!D.conversations) D.conversations = [];
    
    let conv = D.conversations.find(c => 
        c.participants && 
        c.participants.includes(currentUserId) && 
        c.participants.includes(targetUserId)
    );
    
    if (!conv) {
        conv = {
            id: Date.now(),
            participants: [currentUserId, targetUserId],
            lastMessage: '',
            lastMessageDate: '',
            lastMessageSender: '',
            unreadCount: { [currentUserId]: 0, [targetUserId]: 0 }
        };
        D.conversations.push(conv);
        markUnsaved();
    }
    
    return conv;
}

function sendMessageTo(convId, content) {
    if (!content || !content.trim()) return false;
    
    const conv = D.conversations.find(c => c.id === convId);
    if (!conv) return false;
    
    const now = new Date();
    const message = {
        id: Date.now(),
        convId: convId,
        senderId: currentUser.id,
        senderName: getSenderName(),
        content: content.trim(),
        date: todayStr(),
        time: `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`,
        timestamp: now.getTime(),
        isPinned: false,
        isImportant: false,
        readBy: [currentUser.id]
    };
    
    if (!D.messages_conv) D.messages_conv = [];
    D.messages_conv.push(message);
    
    // Mettre à jour la conversation
    conv.lastMessage = content.trim().substring(0, 50);
    conv.lastMessageDate = `${todayStr()} ${message.time}`;
    conv.lastMessageSender = message.senderName;
    
    // Initialiser unreadCount si nécessaire
    if (!conv.unreadCount) conv.unreadCount = {};
    
    conv.participants.forEach(pId => {
        if (pId !== currentUser.id) {
            conv.unreadCount[pId] = (conv.unreadCount[pId] || 0) + 1;
        }
    });
    
    markUnsaved();
    return true;
}

function getSenderName() {
    if (currentRole === 'prof') {
        return `Prof. ${currentUser.prenom} ${currentUser.nom}`;
    } else if (currentRole === 'eleve') {
        return `${currentUser.prenom} ${currentUser.nom}`;
    } else if (currentRole === 'parent') {
        return `Parent de ${currentUser.prenom} ${currentUser.nom}`;
    }
    return currentUser.nom || 'Utilisateur';
}

function markConversationRead(convId) {
    const conv = D.conversations.find(c => c.id === convId);
    if (conv && conv.unreadCount && conv.unreadCount[currentUser.id] > 0) {
        conv.unreadCount[currentUser.id] = 0;
        markUnsaved();
        updateConvBadge();
    }
}

function getConvMessages(convId) {
    if (!D.messages_conv) D.messages_conv = [];
    return D.messages_conv
        .filter(m => m.convId === convId)
        .sort((a, b) => (a.timestamp || 0) - (b.timestamp || 0));
}

function getParticipantInfo(id) {
    // Chercher parmi les élèves
    let p = D.eleves.find(e => e.id === id);
    if (p) return { 
        ...p, 
        role: 'eleve', 
        displayName: `${p.prenom} ${p.nom}`,
        avatar: '👨‍🎓'
    };
    
    // Chercher parmi les professeurs (y compris le principal)
    if (D.prof && D.prof.id === id) {
        return { 
            ...D.prof, 
            role: 'prof', 
            displayName: `Prof. ${D.prof.prenom} ${D.prof.nom}`,
            avatar: '👨‍🏫'
        };
    }
    
    // Chercher parmi les professeurs supplémentaires
    if (D.professeurs) {
        const prof = D.professeurs.find(p => p.id === id);
        if (prof) {
            return { 
                ...prof, 
                role: 'prof', 
                displayName: `Prof. ${prof.prenom} ${prof.nom}`,
                avatar: '👨‍🏫'
            };
        }
    }
    
    // Cas parent (on utilise l'élève comme référence)
    const eleveParent = D.eleves.find(e => e.id === id && (e.parentNom || e.parentPrenom));
    if (eleveParent) {
        return {
            id: eleveParent.id,
            nom: eleveParent.parentNom || eleveParent.nom,
            prenom: eleveParent.parentPrenom || '',
            role: 'parent',
            displayName: `${eleveParent.parentPrenom || ''} ${eleveParent.parentNom || eleveParent.nom}`.trim(),
            avatar: '👨‍👩‍👧'
        };
    }
    
    return null;
}

function getUserConversationsList() {
    // S'assurer que conversations existe
    if (!D.conversations) D.conversations = [];
    
    const userConvs = D.conversations.filter(c => c.participants && c.participants.includes(currentUser.id));
    
    // Trier par dernier message
    return userConvs.sort((a, b) => {
        const aMsg = (D.messages_conv || []).filter(m => m.convId === a.id).pop();
        const bMsg = (D.messages_conv || []).filter(m => m.convId === b.id).pop();
        return (bMsg?.timestamp || 0) - (aMsg?.timestamp || 0);
    });
}

function getTotalUnreadCount() {
    let total = 0;
    D.conversations.forEach(c => {
        if (c.participants.includes(currentUser.id)) total += c.unreadCount[currentUser.id] || 0;
    });
    return total;
}

  const periode = document.getElementById('prof-agenda-periode')?.value || 'all';
  const classe = document.getElementById('prof-agenda-classe')?.value || 'all';
  const content = rAgendaProf();
  document.getElementById('main').innerHTML = content;
  if (window._chartDeferred) window._chartDeferred();
}

// Fonction pour voir le détail d'un devoir
function voirDetailDevoir(eleveId, devoirId, titreDevoir) {
  const statut = getDevoirStatut(eleveId, devoirId);
  const commentaire = getDevoirCommentaire(eleveId, devoirId);
  const eleve = D.eleves.find(e => e.id === eleveId);
  const devoir = D.devoirs.find(d => d.id === devoirId);
  
  openModal(`📋 Détail - ${titreDevoir}`, `
    <div style="background: var(--bg3); border-radius: var(--r); padding: 12px; margin-bottom: 16px;">
      <div><strong>👤 Élève:</strong> ${eleve?.nom} ${eleve?.prenom}</div>
      <div><strong>📅 Date limite:</strong> ${devoir?.date}</div>
      <div><strong>⚙️ Coefficient:</strong> ${devoir?.coeff}</div>
      <div><strong>📊 Statut actuel:</strong> 
        <span class="badge ${statut === 'fait' ? 'b-green' : (statut === 'en_retard' ? 'b-red' : 'b-yellow')}">
          ${statut === 'fait' ? '✅ Fait' : (statut === 'en_retard' ? '⚠️ En retard' : '⏳ À faire')}
        </span>
      </div>
    </div>
    
    ${commentaire ? `
    <div style="background: var(--pdim); border-radius: var(--r); padding: 12px; margin-bottom: 16px;">
      <div><strong>💬 Commentaire de l'élève:</strong></div>
      <div style="font-style: italic; margin-top: 6px;">"${esc(commentaire)}"</div>
    </div>
    ` : '<div class="empty" style="padding: 12px;">Aucun commentaire</div>'}
    
    <div class="mf">
      <label>Ajouter une réponse / appréciation</label>
      <textarea id="prof-reponse" rows="3" placeholder="Merci pour ton travail..."></textarea>
    </div>
  `, () => {
    const reponse = document.getElementById('prof-reponse').value.trim();
    if (reponse) {
      pushNotif(eleveId, 'devoir_reponse', `Retour sur le devoir: ${titreDevoir}`, reponse);
      toast('✅ Réponse envoyée à l\'élève');
    }
    closeModal();
  }, 'Envoyer');
}

// Fonction pour exporter le suivi des devoirs
function exporterSuiviDevoirs() {
  let csv = 'Élève;Devoir;Statut;Date limite;Commentaire\n';
  
  D.eleves.forEach(eleve => {
    D.devoirs.forEach(devoir => {
      const statut = getDevoirStatut(eleve.id, devoir.id);
      const commentaire = getDevoirCommentaire(eleve.id, devoir.id);
      csv += `"${eleve.nom} ${eleve.prenom}";"${devoir.titre}";"${statut}";"${devoir.date}";"${commentaire || ''}"\n`;
    });
  });
  
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8' }));
  a.download = `suivi_devoirs_${todayStr().replace(/\//g, '-')}.csv`;
  a.click();
  toast('📁 Suivi exporté en CSV');
}



// Fonction pour obtenir les statistiques d'agenda
function getStatsAgenda(eleveId) {
  const taches = getTachesPourEleve(eleveId, 'all');
  const total = taches.length;
  const faits = taches.filter(t => t.estFait).length;
  const enRetard = taches.filter(t => t.estEnRetard).length;
  const aFaire = total - faits;
  const pourcentage = total > 0 ? Math.round((faits / total) * 100) : 0;
  
  return { total, faits, aFaire, enRetard, pourcentage };
}

// Fonction pour obtenir les tâches d'un élève
function getTachesPourEleve(eleveId, filtre = 'all') {
  const taches = [];
  
  // 1. Devoirs (non notés ou à venir)
  const devoirsNonNotes = D.devoirs.filter(d => {
    const note = D.notes.find(n => n.eleveId === eleveId && n.devoirId === d.id);
    return !note || note.valeur === null || note.valeur === 'Abs';
  });
  
  devoirsNonNotes.forEach(d => {
    const statut = getDevoirStatut(eleveId, d.id);
    taches.push({
      id: `devoir_${d.id}`,
      type: 'devoir',
      titre: d.titre,
      description: `${d.type} · coeff ${d.coeff}`,
      date: d.date,
      periode: d.periode,
      priorite: d.type === 'Contrôle' ? 'high' : (d.type === 'Interrogation' ? 'medium' : 'low'),
      statut: statut,
      estFait: statut === 'fait',
      estEnRetard: statut === 'en_retard',
      originalId: d.id,
      commentaire: getDevoirCommentaire(eleveId, d.id)
    });
  });
  
  // 2. Travaux du cahier de textes
  const cahierEntries = (D.cahier || []).filter(ct => ct.travail);
  cahierEntries.forEach(ct => {
    const estFait = (D.eleves.find(e => e.id === eleveId)?.doneAgenda || []).includes(ct.id);
    taches.push({
      id: `cahier_${ct.id}`,
      type: 'travail',
      titre: ct.titre,
      description: ct.travail,
      date: ct.date,
      periode: ct.periode,
      priorite: ct.travail?.includes('urgent') ? 'high' : 'medium',
      statut: estFait ? 'fait' : (isDatePast(ct.date) ? 'en_retard' : 'a_faire'),
      estFait: estFait,
      estEnRetard: !estFait && isDatePast(ct.date),
      originalId: ct.id,
      commentaire: ''
    });
  });
  
  // 3. Tâches personnelles
  const tachesPerso = (D.taches_personnelles || []).filter(t => t.eleveId === eleveId);
  tachesPerso.forEach(t => {
    taches.push({
      id: `perso_${t.id}`,
      type: 'personnel',
      titre: t.titre,
      description: t.description || '',
      date: t.date,
      periode: '',
      priorite: t.priorite || 'medium',
      statut: t.status === 'fait' ? 'fait' : (isDatePast(t.date) ? 'en_retard' : 'a_faire'),
      estFait: t.status === 'fait',
      estEnRetard: t.status !== 'fait' && isDatePast(t.date),
      originalId: t.id,
      commentaire: t.commentaire || ''
    });
  });
  
  // Filtrer selon le type demandé
  if (filtre !== 'all') {
    return taches.filter(t => t.type === filtre);
  }
  
  // Trier par date
  return taches.sort((a,b) => compareDates(a.date, b.date));
}

// Fonction pour obtenir le statut d'un devoir
function getDevoirStatut(eleveId, devoirId) {
  const fait = (D.devoirs_faits || []).find(df => df.eleveId === eleveId && df.devoirId === devoirId);
  if (!fait) return 'a_faire';
  
  const devoir = D.devoirs.find(d => d.id === devoirId);
  if (devoir && isDatePast(devoir.date) && fait.status !== 'fait') {
    return 'en_retard';
  }
  return fait.status || 'a_faire';
}

// Fonction pour obtenir le commentaire d'un devoir
function getDevoirCommentaire(eleveId, devoirId) {
  const fait = (D.devoirs_faits || []).find(df => df.eleveId === eleveId && df.devoirId === devoirId);
  return fait?.commentaire || '';
}

// Fonction pour obtenir la priorité d'un devoir
function getPrioriteLabel(priorite) {
  const labels = { high: 'Haute', medium: 'Moyenne', low: 'Basse' };
  return labels[priorite] || 'Moyenne';
}

function getPrioriteIcon(priorite) {
  return priorite === 'high' ? '🔴' : priorite === 'medium' ? '🟠' : '🟢';
}
