function exportAgenda() {
  const e = currentUser;
  const tasks = getAgendaTasksForExport(e.id);
  
  let csv = 'Titre,Type,Description,Date,Statut,Priorité\n';
  tasks.forEach(task => {
    // Échapper les guillemets dans le texte
    const titre = task.titre.replace(/"/g, '""');
    const description = (task.description || '').replace(/"/g, '""');
    const statut = task.isDone ? 'Terminé' : 'En attente';
    
    csv += `"${titre}","${task.type}","${description}","${task.date}","${statut}","${task.priority}"\n`;
  });
  
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8' }));
  a.download = `agenda_${e.nom}_${e.prenom}_${todayStr().replace(/\//g, '-')}.csv`;
  a.click();
  toast('📁 Agenda exporté en CSV');
}

function getAgendaTasksForExport(eleveId) {
  const e = D.eleves.find(el => el.id === eleveId);
  const tasks = [];
  
  // Travaux du cahier
  (D.cahier || []).forEach(ct => {
    if (ct.travail) {
      tasks.push({
        titre: ct.titre,
        type: 'Travail',
        description: ct.travail,
        date: ct.date,
        isDone: e?.doneAgenda?.includes(ct.id) || false,
        priority: getPriority(ct)
      });
    }
  });
  
  // Devoirs futurs
  sortDev().forEach(d => {
    if (!fn2(eleveId, d.id) && d.note) {
      tasks.push({
        titre: d.titre,
        type: 'Devoir',
        description: `${d.type} - coeff ${d.coeff}`,
        date: d.date,
        isDone: false,
        priority: getDevoirPriority(d)
      });
    }
  });
  
  // Tâches personnelles
  const personalTasks = JSON.parse(localStorage.getItem(`personal_tasks_${eleveId}`) || '[]');
  personalTasks.forEach(t => {
    tasks.push({
      titre: t.titre,
      type: 'Personnel',
      description: t.description || '',
      date: t.date,
      isDone: t.isDone || false,
      priority: t.priority
    });
  });
  
  return tasks.sort((a,b) => compareDates(a.date, b.date));
}

function updateBoostPreviewEdit() {
  const bd = window._boostPreviewData;
  if (!bd) return;
  const wrap = document.getElementById('boost-preview-edit');
  if (!wrap) return;
  const boost = document.getElementById('mn-boost')?.value === '1';
  const valRaw = parseFloat(document.getElementById('mn-v')?.value);
  if (isNaN(valRaw) || !boost) {
    wrap.style.display = 'none';
    return;
  }
  const nsWithout = D.notes.filter(n => n.eleveId === bd.eId && typeof n.valeur === 'number' && n.devoirId !== bd.dId);
  const devsP = D.devoirs.filter(d => d.periode === bd.periode);
  const nsP = nsWithout.filter(n => devsP.map(d => d.id).includes(n.devoirId));
  let t = 0, c = 0;
  nsP.forEach(n => {
    const dv = D.devoirs.find(d => d.id === n.devoirId);
    if (dv) {
      t += n.valeur * dv.coeff;
      c += dv.coeff;
    }
  });
  const moyBefore = c ? parseFloat((t / c).toFixed(2)) : null;
  const dv = D.devoirs.find(d => d.id === bd.dId);
  let t2 = t + (valRaw * (dv?.coeff || 1));
  let c2 = c + (dv?.coeff || 1);
  const moyAfter = parseFloat((t2 / c2).toFixed(2));
  const helps = moyAfter >= (moyBefore || 0);
  wrap.style.display = 'block';
  wrap.innerHTML = helps
    ? `<span style="color:var(--green)">✅ Cette note <strong>améliore</strong> la moyenne : ${moyBefore || '—'} → <strong>${moyAfter}/20</strong></span>`
    : `<span style="color:var(--orange)">⚠️ Cette note <strong>n'améliore pas</strong> la moyenne (${moyBefore} → ${moyAfter}). Elle sera ignorée.</span>`;
}

  return`

      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:14px">
        <div class="mf"><label>Moy. actuelle /20</label><input type="number" id="calc-cur" step="0.1" min="0" max="20" value="${m||0}"></div>
        <div class="mf"><label>Objectif /20</label><input type="number" id="calc-obj" step="0.1" min="0" max="20" placeholder="ex: 14"></div>

      </div>

      <button class="btn btn-p" onclick="calcSimul()"><i class="fas fa-calculator"></i> Calculer</button>
      <div class="calc-result" id="calc-result" style="margin-top:14px;display:none;background:var(--bg3);border-radius:var(--r);padding:14px 16px;font-size:13px;color:var(--text2);line-height:1.7"></div>
    </div>
  </div>
  <div class="card"><div class="card-hdr"><div class="card-title">Simulation par devoir futur</div></div>
    <div style="padding:14px">
      <p style="font-size:12px;color:var(--text3);margin-bottom:12px">Entrez une hypothèse de note pour voir comment votre moyenne évoluerait.</p>
      ${D.devoirs.filter(d=>!fn2(e.id,d.id)&&d.note).slice(0,6).map(d=>`
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:10px;padding:10px 14px;background:var(--bg3);border-radius:var(--r)">
        <div style="flex:1"><div style="font-size:13px;font-weight:600">${esc(d.titre)}</div><div style="font-size:11px;color:var(--text3)">coeff ${d.coeff} · <span class="badge b-purple">${d.periode||'—'}</span></div></div>
        <input type="number" class="sim-note" data-id="${d.id}" step="0.5" min="0" max="20" placeholder="/20" oninput="simNote(this)" style="width:70px;padding:6px 10px;background:var(--bg4);border:1px solid var(--border);border-radius:var(--r);color:var(--text);font-family:'JetBrains Mono',monospace;font-size:13px;outline:none">
        <span class="sim-res-${d.id}" style="font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--text3);min-width:70px">→ ?</span>
      </div>`).join('')}
      ${D.devoirs.filter(d=>!fn2(e.id,d.id)&&d.note).length===0?'<div class="empty"><i class="fas fa-check"></i>Tous les devoirs sont notés</div>':''}
    </div>
  </div>`;
}
function calcSimul(){
  const cur=parseFloat(document.getElementById('calc-cur').value);
  const obj=parseFloat(document.getElementById('calc-obj').value);
  const coeff=parseFloat(document.getElementById('calc-coeff').value)||1;
  const n=parseInt(document.getElementById('calc-n').value)||0;
  const res=document.getElementById('calc-result');
  if(isNaN(cur)||isNaN(obj)){res.style.display='none';return toast('Remplis tous les champs','err');}
  const needed=(obj*(n+coeff)-cur*n)/coeff;
  res.style.display='block';
  if(needed<=0)res.innerHTML='✅ Tu as déjà atteint ton objectif !';
  else if(needed>20)res.innerHTML=`❌ Impossible d'atteindre ${obj}/20 depuis ${cur}/20 avec un devoir coeff ${coeff} (base ${n}). Revois ton objectif.`;
  else res.innerHTML=`🎯 Pour passer de <strong>${cur}/20 → ${obj}/20</strong>, tu dois obtenir au minimum <strong style="color:var(--primary);font-size:16px">${needed.toFixed(1)}/20</strong> au prochain devoir (coeff ${coeff}).`;
}
function simNote(inp){
  const eId=currentUser.id,dId=parseInt(inp.dataset.id),val=parseFloat(inp.value);
  const d=D.devoirs.find(x=>x.id===dId),res=document.querySelector('.sim-res-'+dId);
  if(!res||!d)return;
  if(isNaN(val)){res.textContent='→ ?';return;}
  const ns=D.notes.filter(n=>n.eleveId===eId&&typeof n.valeur==='number');
  let t=0,c=0;ns.forEach(n=>{const dv=D.devoirs.find(dv=>dv.id===n.devoirId);if(dv){t+=n.valeur*dv.coeff;c+=dv.coeff;}});
  const sim=parseFloat(((t+val*d.coeff)/(c+d.coeff)).toFixed(2));
  const cur=calcMoy(eId);
  res.innerHTML=`→ <span style="color:${sim>=(cur||0)?'var(--green)':'var(--red)'};font-weight:700">${sim}/20</span>`;
}

// ══════════════════════════════════════════
//  PARENT : NOTES
// ══════════════════════════════════════════
function rPNotes(){
  const e = currentUser;
  const toutesNotes = D.notes.filter(n => n.eleveId === e.id && typeof n.valeur === 'number');
  const moyenneGenerale = calcMoy(e.id);
  
  // Classement général
  const classement = [...D.eleves].map(el => ({...el, moy: calcMoy(el.id)})).filter(el => el.moy !== null).sort((a,b) => b.moy - a.moy);
  const rang = classement.findIndex(el => el.id === e.id) + 1;
  
  return `
  <div class="page-header">
    <div class="page-title">
      <i class="fas fa-chart-bar" style="color:var(--purple)"></i> 
      Notes et résultats de ${e.prenom}
    </div>
  </div>
  
  <!-- Cartes de synthèse parent -->
  <div class="stat-grid">
    <div class="stat-card">
      <div class="sc-icon"><i class="fas fa-chart-line"></i></div>
      <div class="sc-label">Moyenne générale</div>
      <div class="sc-val" style="color: ${moyenneGenerale ? nColor(moyenneGenerale) : 'var(--text3)'}">${moyenneGenerale !== null ? moyenneGenerale : '—'}<span style="font-size:14px">/20</span></div>
      <div class="sc-sub">${mention(moyenneGenerale)}</div>
    </div>
    <div class="stat-card">
      <div class="sc-icon"><i class="fas fa-ranking-star"></i></div>
      <div class="sc-label">Classement général</div>
      <div class="sc-val">${rang > 0 ? rang + 'e' : '—'}<span style="font-size:14px">/${classement.length}</span></div>
      <div class="sc-sub">sur ${classement.length} élèves</div>
    </div>
    <div class="stat-card">
      <div class="sc-icon"><i class="fas fa-star"></i></div>
      <div class="sc-label">Meilleure note</div>
      <div class="sc-val" style="color:var(--green)">${toutesNotes.length ? Math.max(...toutesNotes.map(n => n.valeur)) : '—'}/20</div>
      <div class="sc-sub">⭐ Performance</div>
    </div>
    <div class="stat-card">
      <div class="sc-icon"><i class="fas fa-chart-simple"></i></div>
      <div class="sc-label">Progression</div>
      <div class="sc-val" style="color:${toutesNotes.length > 1 && toutesNotes[toutesNotes.length-1].valeur - toutesNotes[0].valeur >= 0 ? 'var(--green)' : 'var(--orange)'}">
        ${toutesNotes.length > 1 ? (toutesNotes[toutesNotes.length-1].valeur - toutesNotes[0].valeur >= 0 ? '+' : '') + (toutesNotes[toutesNotes.length-1].valeur - toutesNotes[0].valeur).toFixed(1) : '—'}
      </div>
      <div class="sc-sub">depuis le début</div>
    </div>
  </div>
  
  ${['T1','T2','T3'].map(p => {
    const ds = sortDev(p);
    if(!ds.length) return '';
    const mp = calcMoy(e.id, p);
    const notesPeriod = D.notes.filter(n => n.eleveId === e.id && typeof n.valeur === 'number' && ds.map(d => d.id).includes(n.devoirId));
    
    // Statistiques par matière/période
    const meilleurePeriode = notesPeriod.length ? Math.max(...notesPeriod.map(n => n.valeur)) : null;
    const moyennePeriode = notesPeriod.length ? (notesPeriod.reduce((a,b) => a+b.valeur, 0) / notesPeriod.length).toFixed(1) : null;
    
    const classementPeriode = [...D.eleves].map(el => ({...el, moy: calcMoy(el.id, p)})).filter(el => el.moy !== null).sort((a,b) => b.moy - a.moy);
    const rangPeriode = classementPeriode.findIndex(el => el.id === e.id) + 1;
    
    return `<div style="margin-bottom: 28px;">
      <div class="card" style="margin-bottom: 12px;">
        <div style="background: linear-gradient(135deg, var(--purple)20, transparent); padding: 14px 18px; border-bottom: 2px solid var(--purple);">
          <div style="display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px;">
            <div style="display: flex; align-items: center; gap: 12px;">
              <span class="badge" style="background: var(--purple); color: white; font-size: 14px; padding: 5px 14px;">${p}</span>
              <span style="font-size: 12px; color: var(--text3);">${ds.length} devoir${ds.length > 1 ? 's' : ''}</span>
            </div>
            <div style="display: flex; gap: 24px; flex-wrap: wrap;">
              <div>
                <div style="font-size: 10px; color: var(--text3);">Moyenne ${p}</div>
                <div style="font-size: 22px; font-weight: 800; color: ${moyennePeriode ? nColor(moyennePeriode) : 'var(--text3)'}">${moyennePeriode !== null ? moyennePeriode : '—'}<span style="font-size: 12px;">/20</span></div>
              </div>
              <div>
                <div style="font-size: 10px; color: var(--text3);">Classement</div>
                <div style="font-size: 16px; font-weight: 600;">${rangPeriode > 0 ? rangPeriode + 'e / ' + classementPeriode.length : '—'}</div>
              </div>
              <div>
                <div style="font-size: 10px; color: var(--text3);">Meilleure note</div>
                <div style="font-size: 16px; font-weight: 600; color: var(--green);">${meilleurePeriode !== null ? meilleurePeriode : '—'}/20</div>
              </div>
            </div>
          </div>
        </div>
        
        <!-- Liste des devoirs avec affichage amélioré -->
        <div style="overflow-x: auto;">
          <table style="width: 100%; border-collapse: collapse;">
            <thead>
              <tr style="background: var(--bg3); border-bottom: 1px solid var(--border2);">
                <th style="padding: 12px; text-align: left;">Devoir</th>
                <th style="padding: 12px; text-align: center;">Date</th>
                <th style="padding: 12px; text-align: center;">Type</th>
                <th style="padding: 12px; text-align: center;">Coeff.</th>
                <th style="padding: 12px; text-align: center;">Note</th>
                <th style="padding: 12px; text-align: center;">Moy. classe</th>
                <th style="padding: 12px; text-align: left;">Appréciation</th>
              </tr>
            </thead>
            <tbody>
              ${ds.map(d => {
                const n = fn2(e.id, d.id);
                const ns = D.notes.filter(x => x.devoirId === d.id && typeof x.valeur === 'number');
                const clV = ns.length ? (ns.reduce((a,b) => a+b.valeur, 0) / ns.length).toFixed(1) : null;
                const ecart = n && n.valeur !== 'Abs' && clV ? (n.valeur - parseFloat(clV)).toFixed(1) : null;
                const meilleure = ns.length ? Math.max(...ns.map(x => x.valeur)) : null;
                
                return `<tr style="border-bottom: 1px solid var(--border2);">
                  <td style="padding: 12px;">
                    <div style="font-weight: 600;">${esc(d.titre)}</div>
                    ${d.note === false ? '<span class="badge b-teal" style="font-size: 9px;">Non noté</span>' : ''}
                  </td>
                  <td style="padding: 12px; text-align: center; font-family: monospace;">${d.date}</td>
                  <td style="padding: 12px; text-align: center;">${tBadge(d.type)}</td>
                  <td style="padding: 12px; text-align: center;">${d.coeff}</td>
                  <td style="padding: 12px; text-align: center;">
                    ${n && n.valeur !== null ? 
                      (n.valeur === 'Abs' ? 
                        '<span class="badge b-red">🚫 Absent</span>' : 
                        `<div style="display: flex; flex-direction: column; align-items: center;">
                          <div style="font-size: 20px; font-weight: 800; color: ${nColor(n.valeur)};">${n.valeur}</div>
                          <div style="font-size: 10px; color: var(--text3);">/20</div>
                          ${ecart ? `<div style="font-size: 10px; color: ${ecart >= 0 ? 'var(--green)' : 'var(--orange)'};">${ecart >= 0 ? '▲' : '▼'} ${Math.abs(ecart)} pts</div>` : ''}
                        </div>`
                      ) : '<span style="color: var(--text3);">—</span>'
                    }
                  </td>
                  <td style="padding: 12px; text-align: center;">
                    ${clV ? `<div><span style="font-size: 16px; font-weight: 500;">${clV}</span><span style="font-size: 11px;">/20</span></div>
                    <div style="font-size: 10px; color: var(--text3);">Meilleure: ${meilleure}/20</div>` : '—'}
                  </td>
                  <td style="padding: 12px;">
                    <div style="font-size: 12px; color: var(--text2); font-style: italic; max-width: 200px;">
                      ${n?.appreciation ? `💬 ${esc(n.appreciation.substring(0, 80))}${n.appreciation.length > 80 ? '...' : ''}` : '—'}
                    </div>
                  </td>
                </tr>`;
              }).join('')}
            </tbody>
          </table>
        </div>
        
        ${notesPeriod.length > 0 ? `
        <div style="padding: 14px 18px; background: var(--bg3); border-top: 1px solid var(--border2);">
          <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px;">
            <div>
              <span style="font-size: 11px; color: var(--text3);">📊 Analyse ${p} :</span>
              <span style="font-size: 13px; margin-left: 8px;">
                ${moyennePeriode && moyennePeriode >= 12 ? '✅ Bon niveau' : moyennePeriode && moyennePeriode >= 10 ? '⚠️ Niveau passable' : moyennePeriode ? '🔴 Des efforts nécessaires' : ''}
              </span>
            </div>
            <div style="display: flex; gap: 16px;">
              <div><span style="font-size: 11px; color: var(--text3);">Notes ≥ 15 :</span> <strong>${notesPeriod.filter(n => n.valeur >= 15).length}</strong></div>
              <div><span style="font-size: 11px; color: var(--text3);">Notes &lt; 10 :</span> <strong>${notesPeriod.filter(n => n.valeur < 10).length}</strong></div>
            </div>
          </div>
        </div>
        ` : ''}
      </div>
    </div>`;
  }).join('')}
  
  ${(() => {
    const devsFuturs = sortDev().filter(d => !fn2(e.id, d.id) && d.note);
    if (devsFuturs.length === 0) return '';
    return `
    <div class="card" style="margin-top: 16px; background: var(--ydim); border-color: var(--yellow);">
      <div class="card-hdr">
        <div class="card-title"><i class="fas fa-bell" style="color: var(--yellow);"></i> Devoirs à venir</div>
      </div>
      <div style="padding: 12px 16px;">
        ${devsFuturs.map(d => `
          <div style="display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--border2);">
            <i class="fas fa-calendar-alt" style="color: var(--yellow);"></i>
            <div style="flex: 1;">
              <div style="font-weight: 600;">${esc(d.titre)}</div>
              <div style="font-size: 11px; color: var(--text3);">${d.date} · ${d.type} · coeff ${d.coeff}</div>
            </div>
            <span class="badge b-yellow">Prévu</span>
          </div>
        `).join('')}
        <div style="margin-top: 12px; font-size: 11px; color: var(--text3); text-align: center;">
          <i class="fas fa-info-circle"></i> Ces devoirs n'ont pas encore été notés
        </div>
      </div>
    </div>`;
  })()}`;
}

// ══════════════════════════════════════════
//  PARENT : ÉVOLUTION
// ══════════════════════════════════════════
function rPEvolution(){
  const e=currentUser;
  const devs=sortDev();
  const myData=devs.map(d=>{const n=fn2(e.id,d.id);return(n&&typeof n.valeur==='number')?n.valeur:null;});
  const classData=devs.map(d=>{const ns=D.notes.filter(n=>n.devoirId===d.id&&typeof n.valeur==='number');return ns.length?(ns.reduce((a,b)=>a+b.valeur,0)/ns.length):null;});
  const html=`
  <div class="page-header"><div class="page-title"><i class="fas fa-chart-line" style="color:var(--purple)"></i> Évolution de ${currentUser.prenom}</div></div>
  <div class="card"><div class="card-hdr"><div class="card-title">Courbe de progression</div></div>
    <div style="padding:16px;height:280px;position:relative"><canvas id="cht-parent-evol"></canvas></div>
  </div>
  <div class="card"><div class="card-hdr"><div class="card-title">Analyse</div></div>
    <div style="padding:14px 16px">
      ${(()=>{const validData=myData.filter(x=>x!==null);if(!validData.length)return'<p style="color:var(--text3)">Pas encore de données.</p>';const trend=validData.length>1?validData[validData.length-1]-validData[validData.length-2]:0;const avg=(validData.reduce((a,b)=>a+b,0)/validData.length).toFixed(2);return`<div style="display:flex;gap:16px;flex-wrap:wrap">
        <div style="background:var(--bg3);border-radius:var(--r);padding:12px 16px;flex:1;min-width:120px;text-align:center"><div style="font-size:10px;color:var(--text3);text-transform:uppercase;margin-bottom:4px">Moyenne générale</div><div style="font-size:22px;font-weight:800;color:var(--primary)">${avg}/20</div></div>
        <div style="background:var(--bg3);border-radius:var(--r);padding:12px 16px;flex:1;min-width:120px;text-align:center"><div style="font-size:10px;color:var(--text3);text-transform:uppercase;margin-bottom:4px">Tendance récente</div><div style="font-size:22px;font-weight:800;color:${trend>=0?'var(--green)':'var(--red)'}">${trend>=0?'↗':'↘'} ${Math.abs(trend).toFixed(1)}</div></div>
        <div style="background:var(--bg3);border-radius:var(--r);padding:12px 16px;flex:1;min-width:120px;text-align:center"><div style="font-size:10px;color:var(--text3);text-transform:uppercase;margin-bottom:4px">Notes prises</div><div style="font-size:22px;font-weight:800">${validData.length}</div></div>
      </div>`;})()}
    </div>
  </div>`;
  window._chartDeferred=()=>{
    const ctx=document.getElementById('cht-parent-evol');if(!ctx)return;
    const c=new Chart(ctx,{type:'line',data:{labels:devs.map(d=>d.titre),datasets:[
      {label:currentUser.prenom,data:myData,borderColor:'#a78bfa',backgroundColor:'rgba(167,139,250,.1)',tension:.4,fill:true,pointRadius:5,spanGaps:true},
      {label:'Moy. classe',data:classData,borderColor:'#6384ff',tension:.4,fill:false,pointRadius:3,borderDash:[5,5],spanGaps:true}
    ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#8896b3'}}},scales:{x:{ticks:{color:'#8896b3'},grid:{color:'rgba(255,255,255,.04)'}},y:{min:0,max:20,ticks:{color:'#8896b3'},grid:{color:'rgba(255,255,255,.04)'}}}}});
    activeCharts.push(c);
  };
  return html;
}

// ══════════════════════════════════════════
//  PARENT : BULLETIN
// ══════════════════════════════════════════
function rPBulletin(){
  const e=currentUser;
  return`
  <div class="page-header"><div class="page-title"><i class="fas fa-file-alt" style="color:var(--yellow)"></i> Bulletin de ${e.prenom}</div></div>
  <div class="period-tabs">${['T1','T2','T3'].map(p=>`<button class="period-tab ${p===currentPeriod?'active':''}" onclick="currentPeriod='${p}';navigate('p_bulletin')">${p}</button>`).join('')}</div>
  ${(()=>{
    const m=calcMoy(e.id,currentPeriod);

      <div style="background:linear-gradient(135deg,#4c1d95,var(--primary));padding:24px 28px;color:#fff">

        <div style="font-size:13px;opacity:.75">${D.prof.matiere} · ${D.prof.classe} · ${currentPeriod}</div>
      </div>
      <div style="padding:18px 20px;display:flex;gap:28px;border-bottom:1px solid var(--border2)">
        <div><div style="font-size:10px;color:var(--text3);text-transform:uppercase">Moyenne ${currentPeriod}</div><div style="font-size:32px;font-weight:800">${m!==null?m:'—'}/20</div></div>
        <div><div style="font-size:10px;color:var(--text3);text-transform:uppercase">Classement</div><div style="font-size:32px;font-weight:800">${rang>0?rang+'e':'—'}</div></div>
        <div><div style="font-size:10px;color:var(--text3);text-transform:uppercase">Mention</div><div style="font-size:18px;font-weight:700;padding-top:8px">${mention(m)}</div></div>
      </div>
      <div style="padding:16px 20px;background:var(--bg3);border-top:1px solid var(--border2)">
        <div style="font-size:10px;font-weight:700;text-transform:uppercase;color:var(--text3);margin-bottom:7px">Appréciation du professeur</div>
        <div style="font-size:14px;color:var(--text2);font-style:italic">"${comm?esc(comm.texte):'Aucune appréciation rédigée pour ce trimestre.'}"</div>
      </div>
    </div>
    <button class="btn btn-sm" onclick="printBulletin(${e.id},'${currentPeriod}')"><i class="fas fa-print"></i> Imprimer</button>`;
  })()}`;
}

// ══════════════════════════════════════════
//  PARENT : AGENDA
// ══════════════════════════════════════════
function rPAgenda(){
  const e=currentUser;
  const hw=(D.cahier||[]).filter(c=>c.travail).sort((a,b)=>b.id-a.id);

    <div style="padding:10px 14px">${devsFuturs.map(d=>`<div class="agenda-item"><div class="agenda-dot" style="background:var(--primary)"></div><div class="agenda-content"><div class="agenda-title">${esc(d.titre)}</div><div class="agenda-meta">${d.date} · ${d.type} · coeff ${d.coeff}</div></div></div>`).join('')}</div>
  </div>`:''}
  <div class="card"><div class="card-hdr"><div class="card-title"><i class="fas fa-home" style="color:var(--yellow)"></i> Travaux à faire à la maison</div></div>

        <div class="agenda-meta">${ct.date}</div>
      </div>
    </div>`).join('')}</div>`}
  </div>`;
}

// ══════════════════════════════════════════
//  PARENT : MESSAGES
// ══════════════════════════════════════════
function rPMessages(){
  const e=currentUser;

// Calculer le niveau d'acquisition d'une compétence pour un élève
function getNiveauCompetence(eleveId, competenceId, periode = null) {
  const acquis = D.competences.acquis.filter(a => 
    a.eleveId === eleveId && 
    a.competenceId === competenceId
  );
  
  if (!acquis.length) return null;
  
  // Prendre la dernière évaluation ou la moyenne
  const derniere = acquis.sort((a,b) => b.date.localeCompare(a.date))[0];
  
  // Si période spécifiée, filtrer
  if (periode) {
    const periodeAcquis = acquis.filter(a => a.periode === periode);
    if (periodeAcquis.length) {
      const moyenne = periodeAcquis.reduce((sum, a) => sum + a.niveau, 0) / periodeAcquis.length;
      return Math.round(moyenne);
    }
  }
  
  return derniere.niveau;
}

// Évaluer une compétence à partir d'une note
function evaluerCompetenceFromNote(eleveId, devoirId, competenceId, note) {
  if (note === 'Abs' || note === null) return null;
  
  // Convertir note en niveau de compétence
  let niveau;
  if (note >= 18) niveau = 4;      // Expert
  else if (note >= 15) niveau = 3; // Acquis
  else if (note >= 12) niveau = 2; // En cours
  else if (note >= 8) niveau = 1;  // Non acquis
  else niveau = 1;                  // Non acquis également
  
  // Trouver l'acquisition existante
  const existing = D.competences.acquis.find(a => 
    a.eleveId === eleveId && 
    a.competenceId === competenceId && 
    a.devoirId === devoirId
  );
  
  if (existing) {
    existing.niveau = niveau;
    existing.date = todayStr();
  } else {
    D.competences.acquis.push({
      id: nid(D.competences.acquis),
      eleveId,
      competenceId,
      devoirId,
      niveau,
      date: todayStr(),
      periode: D.devoirs.find(d => d.id === devoirId)?.periode || 'T1',
      appreciation: ''
    });
  }
  
  return niveau;
}

function evaluerCompetence(eleveId, competenceId) {
  const eleve = D.eleves.find(e => e.id === eleveId);
  const comp = D.competences.referentiel.find(c => c.id === competenceId);

function getTachesPourEleve(eleveId, filtre = 'all') {
  const taches = [];
  
  // 1. Devoirs (non notés ou à venir)
  const devoirsNonNotes = D.devoirs.filter(d => {
    const note = D.notes.find(n => n.eleveId === eleveId && n.devoirId === d.id);
    return !note || note.valeur === null || note.valeur === 'Abs';
  });
  
  devoirsNonNotes.forEach(d => {
    const statut = getDevoirStatut(eleveId, d.id);
    taches.push({
      id: `devoir_${d.id}`,
      type: 'devoir',
      titre: d.titre,
      description: `${d.type} · coeff ${d.coeff}`,
      date: d.date,
      periode: d.periode,
      priorite: d.type === 'Contrôle' ? 'high' : (d.type === 'Interrogation' ? 'medium' : 'low'),
      statut: statut,
      estFait: statut === 'fait',
      estEnRetard: statut === 'en_retard',
      originalId: d.id,
      commentaire: getDevoirCommentaire(eleveId, d.id)
    });
  });
  
  // 2. Travaux du cahier de textes
  const cahierEntries = (D.cahier || []).filter(ct => ct.travail);
  cahierEntries.forEach(ct => {
    const estFait = (D.eleves.find(e => e.id === eleveId)?.doneAgenda || []).includes(ct.id);
    taches.push({
      id: `cahier_${ct.id}`,
      type: 'travail',
      titre: ct.titre,
      description: ct.travail,
      date: ct.date,
      periode: ct.periode,
      priorite: ct.travail?.includes('urgent') ? 'high' : 'medium',
      statut: estFait ? 'fait' : (isDatePast(ct.date) ? 'en_retard' : 'a_faire'),
      estFait: estFait,
      estEnRetard: !estFait && isDatePast(ct.date),
      originalId: ct.id,
      commentaire: ''
    });
  });
  
  // 3. Tâches personnelles
  const tachesPerso = (D.taches_personnelles || []).filter(t => t.eleveId === eleveId);
  tachesPerso.forEach(t => {
    taches.push({
      id: `perso_${t.id}`,
      type: 'personnel',
      titre: t.titre,
      description: t.description || '',
      date: t.date,
      periode: '',
      priorite: t.priorite || 'medium',
      statut: t.status === 'fait' ? 'fait' : (isDatePast(t.date) ? 'en_retard' : 'a_faire'),
      estFait: t.status === 'fait',
      estEnRetard: t.status !== 'fait' && isDatePast(t.date),
      originalId: t.id,
      commentaire: t.commentaire || ''
    });
  });
  
  // Filtrer selon le type demandé
  if (filtre !== 'all') {
    return taches.filter(t => t.type === filtre);
  }
  
  // Trier par date
  return taches.sort((a,b) => compareDates(a.date, b.date));
}

function getDevoirStatut(eleveId, devoirId) {
  const fait = (D.devoirs_faits || []).find(df => df.eleveId === eleveId && df.devoirId === devoirId);
  if (!fait) return 'a_faire';
  
  const devoir = D.devoirs.find(d => d.id === devoirId);
  if (devoir && isDatePast(devoir.date) && fait.status !== 'fait') {
    return 'en_retard';
  }
  return fait.status || 'a_faire';
}

function getDevoirCommentaire(eleveId, devoirId) {
  const fait = (D.devoirs_faits || []).find(df => df.eleveId === eleveId && df.devoirId === devoirId);
  return fait?.commentaire || '';
}

function setDevoirFait(eleveId, devoirId, status, commentaire = '') {
  if (!D.devoirs_faits) D.devoirs_faits = [];
  
  const index = D.devoirs_faits.findIndex(df => df.eleveId === eleveId && df.devoirId === devoirId);
  const now = new Date();
  const dateSoumission = `${String(now.getDate()).padStart(2,'0')}/${String(now.getMonth()+1).padStart(2,'0')}`;
  
  const data = {
    eleveId,
    devoirId,
    status,
    commentaire,
    dateSoumission,
    heureSoumission: `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`
  };
  
  if (index >= 0) {
    D.devoirs_faits[index] = { ...D.devoirs_faits[index], ...data };
  } else {
    D.devoirs_faits.push({ id: nid(D.devoirs_faits), ...data });
  }
  
  markUnsaved();
  
  // Créer une notification pour le professeur
  const eleve = D.eleves.find(e => e.id === eleveId);
  const devoir = D.devoirs.find(d => d.id === devoirId);
  if (eleve && devoir) {
    pushNotifForProf(eleveId, 'devoir_fait', `Devoir rendu: ${devoir.titre}`, 
      `${eleve.prenom} ${eleve.nom} a marqué le devoir "${devoir.titre}" comme ${status === 'fait' ? 'fait' : 'non fait'}.`);
  }
}

function pushNotifForProf(eleveId, type, title, body) {
  if (!D.notifications) D.notifications = [];
  D.notifications.push({
    id: nid(D.notifications),
    eleveId: eleveId,
    type: type,
    title: title,
    body: body,
    date: todayStr(),
    read: false,
    forProf: true
  });
  updateNotifDot();
}

function getStatsAgenda(eleveId) {
  const taches = getTachesPourEleve(eleveId, 'all');
  const total = taches.length;
  const faits = taches.filter(t => t.estFait).length;
  const enRetard = taches.filter(t => t.estEnRetard).length;
  const aFaire = total - faits;
  const pourcentage = total > 0 ? Math.round((faits / total) * 100) : 0;
  
  return { total, faits, aFaire, enRetard, pourcentage };
}

function isDateFuture(dateStr) {
  const [day, month] = dateStr.split('/');
  const today = new Date();
  const d = new Date();
  d.setDate(parseInt(day));
  d.setMonth(parseInt(month) - 1);
  d.setFullYear(today.getFullYear());
  return d >= today.setHours(0,0,0,0);
}

function isDatePast(dateStr) {
  const [day, month] = dateStr.split('/');
  const today = new Date();
  const d = new Date();
  d.setDate(parseInt(day));
  d.setMonth(parseInt(month) - 1);
  d.setFullYear(today.getFullYear());
  return d < today.setHours(0,0,0,0);
}

function compareDates(dateA, dateB) {
  const [dA, mA] = dateA.split('/');
  const [dB, mB] = dateB.split('/');
  return (parseInt(mA)*100 + parseInt(dA)) - (parseInt(mB)*100 + parseInt(dB));
}

function formatDateWithDay(dateStr) {
  const [day, month] = dateStr.split('/');
  const date = new Date();
  date.setDate(parseInt(day));
  date.setMonth(parseInt(month) - 1);
  const days = ['Dimanche', 'Lundi', 'Mardi', 'Mercredi', 'Jeudi', 'Vendredi', 'Samedi'];
  return `${dateStr} (${days[date.getDay()]})`;
}

function getPrioriteLabel(priorite) {
  const labels = { high: 'Haute', medium: 'Moyenne', low: 'Basse' };

function getPrioriteIcon(priorite) {

function logAction(action, type = 'info', details = '') {
  if (!D.logs) D.logs = [];
  const now = new Date();
  D.logs.push({
    id: nid(D.logs),
    action,
    type, // 'success', 'error', 'warning', 'info'
    details,
    user: currentUser?.nom || 'Système',
    role: currentRole,
    date: todayStr(),
    time: `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`
  });
  
  // Garder seulement les 500 derniers logs
  if (D.logs.length > 500) {
    D.logs = D.logs.slice(-500);
  }
  
  markUnsaved();
}

function ajoutProfesseur() {
  openModal('Ajouter un professeur', `
    <div class="mf-row">
      <div class="mf"><label>Nom</label><input id="p-nom" type="text" placeholder="DUPONT"></div>
      <div class="mf"><label>Prénom</label><input id="p-prenom" type="text" placeholder="Jean"></div>
    </div>
    <div class="mf"><label>Email</label><input id="p-email" type="email" placeholder="jean.dupont@ecole.fr"></div>
    <div class="mf-row">
      <div class="mf"><label>Matière</label><input id="p-matiere" type="text" placeholder="Mathématiques"></div>
      <div class="mf"><label>Classe</label><input id="p-classe" type="text" placeholder="4B"></div>
    </div>
    <div class="mf-row">
      <div class="mf"><label>Mot de passe</label><input id="p-mdp" type="password" placeholder="••••••••"></div>
    </div>
  `, () => {
    const nom = document.getElementById('p-nom').value.trim().toUpperCase();
    const prenom = document.getElementById('p-prenom').value.trim();
    const mdp = document.getElementById('p-mdp').value.trim();
    if (!nom || !prenom) return toast('Nom et prénom requis', 'err');
    if (!mdp) return toast('Mot de passe requis', 'err');
    
    if (!D.professeurs) D.professeurs = [];
    D.professeurs.push({
      id: nid(D.professeurs),
      nom,
      prenom,
      email: document.getElementById('p-email').value.trim(),
      matiere: document.getElementById('p-matiere').value.trim(),
      classe: document.getElementById('p-classe').value.trim(),
      mdp,
      role: 'prof'
    });
    
    markUnsaved();
    logAction(`Ajout professeur: ${prenom} ${nom}`, 'success');
    navigate('admin_profs');
    toast('✅ Professeur ajouté');
  });
}

function modifierProfesseur(id) {
  const p = D.professeurs.find(prof => prof.id === id);
  if (!p) return;
  
  openModal('Modifier le professeur', `
    <div class="mf-row">
      <div class="mf"><label>Nom</label><input id="p-nom" type="text" value="${esc(p.nom)}"></div>
      <div class="mf"><label>Prénom</label><input id="p-prenom" type="text" value="${esc(p.prenom)}"></div>
    </div>
    <div class="mf"><label>Email</label><input id="p-email" type="email" value="${esc(p.email)}"></div>
    <div class="mf-row">
      <div class="mf"><label>Matière</label><input id="p-matiere" type="text" value="${esc(p.matiere)}"></div>
      <div class="mf"><label>Classe</label><input id="p-classe" type="text" value="${esc(p.classe)}"></div>
    </div>
    <div class="mf"><label>Nouveau mot de passe (laisser vide pour ne pas changer)</label><input id="p-mdp" type="password" placeholder="••••••••"></div>
  `, () => {
    p.nom = document.getElementById('p-nom').value.trim().toUpperCase();
    p.prenom = document.getElementById('p-prenom').value.trim();
    p.email = document.getElementById('p-email').value.trim();
    p.matiere = document.getElementById('p-matiere').value.trim();
    p.classe = document.getElementById('p-classe').value.trim();
    const newMdp = document.getElementById('p-mdp').value;
    if (newMdp) p.mdp = newMdp;
    
    markUnsaved();
    logAction(`Modification professeur: ${p.prenom} ${p.nom}`, 'info');
    navigate('admin_profs');
    toast('✅ Professeur modifié');
  });
}

function supprimerProfesseur(id) {
  if (!confirm('⚠️ Supprimer ce professeur ? Cette action est irréversible.')) return;
  D.professeurs = D.professeurs.filter(p => p.id !== id);
  markUnsaved();
  logAction(`Suppression professeur ID: ${id}`, 'warning');
  navigate('admin_profs');
  toast('🗑️ Professeur supprimé');
}

function rAdminClasses() {

    const eleves = D.eleves.filter(e => e.classe === classe);
    const moyennes = eleves.map(e => calcMoy(e.id)).filter(m => m !== null);
    const moyenneClasse = moyennes.length ? (moyennes.reduce((a,b) => a+b, 0) / moyennes.length).toFixed(2) : '—';
    return { classe, effectif: eleves.length, moyenne: moyenneClasse };
  });
  
  return `

      <div class="sc-val">${D.eleves.length}</div>
    </div>
    <div class="stat-card">
      <div class="sc-label">Moy. par classe</div>
      <div class="sc-val">${statsParClasse.filter(s => s.moyenne !== '—').length ? 
        (statsParClasse.filter(s => s.moyenne !== '—').reduce((a,b) => a + parseFloat(b.moyenne), 0) / 
         statsParClasse.filter(s => s.moyenne !== '—').length).toFixed(2) : '—'}</div>
    </div>
  </div>
  
  <div class="card">
    <table class="dt">
      <thead>
        <tr>
          <th>Classe</th>
          <th>Effectif</th>
          <th>Moyenne générale</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        ${statsParClasse.map(s => `
          <tr>
            <td><strong>${esc(s.classe)}</strong></td>
            <td>${s.effectif} élèves</td>
            <td>${s.moyenne !== '—' ? s.moyenne + '/20' : '—'}</td>
            <td>
              <button class="btn btn-sm" onclick="voirClasse('${s.classe}')"><i class="fas fa-eye"></i></button>

function ajouterClasse() {
  openModal('Nouvelle classe', `
    <div class="mf"><label>Nom de la classe</label><input id="classe-nom" type="text" placeholder="Ex: 3A, 4B, Terminale S..."></div>
    <div class="mf"><label>Niveau</label><select id="classe-niveau"><option>6e</option><option>5e</option><option>4e</option><option>3e</option><option>Seconde</option><option>Première</option><option>Terminale</option></select></div>
  `, () => {
    const nom = document.getElementById('classe-nom').value.trim();
    if (!nom) return toast('Nom de classe requis', 'err');
    toast(`✅ Classe ${nom} créée (vous pouvez maintenant y ajouter des élèves)`, 'ok');
    closeModal();
  });
}

function voirClasse(classe) {
  const eleves = D.eleves.filter(e => e.classe === classe);
  const moyennes = eleves.map(e => calcMoy(e.id)).filter(m => m !== null);
  const moyenneClasse = moyennes.length ? (moyennes.reduce((a,b) => a+b, 0) / moyennes.length).toFixed(2) : '—';
  
  openModal(`📚 Classe ${classe}`, `

      <thead><tr><th>Élève</th><th>Moyenne</th></tr></thead>
      <tbody>
        ${eleves.map(e => {
          const m = calcMoy(e.id);
          return `<tr><td>${e.nom} ${e.prenom}</td><td>${m !== null ? m + '/20' : '—'}</td></tr>`;
        }).join('')}

    </table>

}

//  ADMIN : STATISTIQUES GLOBALES
// ══════════════════════════════════════════

function rAdminStats() {
  const totalEleves = D.eleves.length;
  const totalNotes = D.notes.filter(n => typeof n.valeur === 'number').length;
  const totalDevoirs = D.devoirs.length;
  const totalAbsences = D.absences.length;
  
  const distributionNotes = { '0-5': 0, '5-10': 0, '10-12': 0, '12-15': 0, '15-18': 0, '18-20': 0 };
  D.notes.forEach(n => {
    if (typeof n.valeur === 'number') {
      if (n.valeur < 5) distributionNotes['0-5']++;
      else if (n.valeur < 10) distributionNotes['5-10']++;
      else if (n.valeur < 12) distributionNotes['10-12']++;
      else if (n.valeur < 15) distributionNotes['12-15']++;
      else if (n.valeur < 18) distributionNotes['15-18']++;
      else distributionNotes['18-20']++;
    }
  });
  
  const meilleursEleves = [...D.eleves]
    .map(e => ({ ...e, moy: calcMoy(e.id) }))
    .filter(e => e.moy !== null)
    .sort((a,b) => b.moy - a.moy)
    .slice(0, 5);
  
  return `
  <div class="page-header">
    <div class="page-title">
      <i class="fas fa-chart-line" style="color:var(--accent)"></i> 
      Statistiques globales
    </div>
  </div>
  
  <div class="stat-grid">
    <div class="stat-card"><div class="sc-label">📊 Total élèves</div><div class="sc-val">${totalEleves}</div></div>
    <div class="stat-card"><div class="sc-label">📝 Notes saisies</div><div class="sc-val">${totalNotes}</div></div>
    <div class="stat-card"><div class="sc-label">📚 Devoirs</div><div class="sc-val">${totalDevoirs}</div></div>
    <div class="stat-card"><div class="sc-label">📅 Absences</div><div class="sc-val">${totalAbsences}</div></div>
  </div>
  
  <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
    <div class="card">
      <div class="card-hdr"><div class="card-title">Distribution des notes</div></div>
      <div style="padding: 14px;">
        ${Object.entries(distributionNotes).map(([range, count]) => `
          <div style="margin-bottom: 10px;">
            <div style="display: flex; justify-content: space-between; font-size: 12px;">
              <span>${range}/20</span>
              <span>${count}</span>
            </div>
            <div class="prog-bar"><div class="prog-fill" style="width: ${(count / Math.max(1, totalNotes)) * 100}%; background: var(--primary);"></div></div>
          </div>
        `).join('')}
      </div>
    </div>
    
    <div class="card">
      <div class="card-hdr"><div class="card-title">🏆 Top 5 des meilleurs élèves</div></div>
      <table class="dt">
        <thead><tr><th>#</th><th>Élève</th><th>Moyenne</th></tr></thead>
        <tbody>
          ${meilleursEleves.map((e, i) => `
            <tr>
              <td><span class="rank ${i < 3 ? 'r'+(i+1) : 'rn'}">${i+1}</span></td>
              <td>${e.nom} ${e.prenom}</td>
              <td>${e.moy}/20</td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>
  </div>`;
}

      <button class="btn" onclick="importerDonnees()"><i class="fas fa-upload"></i> Importer JSON</button>

function creerSauvegarde() {
  openModal('Créer une sauvegarde', `
    <div class="mf"><label>Description (optionnel)</label><input id="backup-desc" type="text" placeholder="Avant modifications importantes..."></div>
  `, () => {
    const description = document.getElementById('backup-desc').value.trim() || `Sauvegarde du ${todayStr()}`;
    const backups = JSON.parse(localStorage.getItem('edu_backups') || '[]');
    backups.unshift({
      date: todayStr(),
      time: new Date().toLocaleTimeString(),
      description,
      data: JSON.parse(JSON.stringify(D))
    });
    if (backups.length > 10) backups.pop();
    localStorage.setItem('edu_backups', JSON.stringify(backups));
    localStorage.setItem('edu_bak', JSON.stringify(D));
    toast('✅ Sauvegarde créée');
    navigate('admin_backup');
  });
}

function restaurerSauvegarde() {
  openModal('Restaurer une sauvegarde', `
    <div class="alert alert-warn" style="background: var(--rdim); padding: 12px; border-radius: var(--r); margin-bottom: 16px;">
      <i class="fas fa-triangle-exclamation"></i> Attention : Cette action remplacera toutes les données actuelles.
    </div>
    <div class="mf"><label>Entrez "CONFIRMER" pour valider</label><input id="confirm-text" type="text" placeholder="CONFIRMER"></div>
  `, () => {
    if (document.getElementById('confirm-text').value !== 'CONFIRMER') return toast('Confirmation incorrecte', 'err');
    const backups = JSON.parse(localStorage.getItem('edu_backups') || '[]');
    if (backups.length === 0) return toast('Aucune sauvegarde disponible', 'err');
    const derniere = backups[0];
    D = JSON.parse(JSON.stringify(derniere.data));
    markUnsaved();
    logAction('Restauration depuis sauvegarde', 'success');
    toast('✅ Données restaurées');
    navigate('admin_backup');
  });
}

function chargerSauvegarde(index) {
  const backups = JSON.parse(localStorage.getItem('edu_backups') || '[]');
  if (!backups[index]) return toast('Sauvegarde introuvable', 'err');
  if (!confirm(`Restaurer la sauvegarde du ${backups[index].date} ?`)) return;
  D = JSON.parse(JSON.stringify(backups[index].data));
  markUnsaved();
  logAction(`Restauration sauvegarde: ${backups[index].description}`, 'success');
  toast('✅ Données restaurées');
  navigate('admin_backup');
}

function supprimerSauvegarde(index) {
  if (!confirm('Supprimer cette sauvegarde ?')) return;
  const backups = JSON.parse(localStorage.getItem('edu_backups') || '[]');
  backups.splice(index, 1);
  localStorage.setItem('edu_backups', JSON.stringify(backups));
  navigate('admin_backup');
  toast('🗑️ Sauvegarde supprimée');
}

function exporterDonnees() {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([JSON.stringify(D, null, 2)], { type: 'application/json' }));
  a.download = `edutrack_backup_${todayStr().replace(/\//g, '-')}.json`;
  a.click();
  toast('📁 Export JSON effectué');
}

function importerDonnees() {
  document.getElementById('import-file').click();
}

function importerFichierJSON(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const imported = JSON.parse(e.target.result);
      if (!confirm('⚠️ Importer ces données ? Les données actuelles seront remplacées.')) return;
      D = imported;
      markUnsaved();
      logAction('Import JSON des données', 'success');
      toast('✅ Données importées');
      navigate('admin_backup');
    } catch (err) {
      toast('Fichier JSON invalide', 'err');
    }
  };
  reader.readAsText(file);
  input.value = '';
}

function verifierIntegrite() {
  let erreurs = [];
  if (!D.eleves) erreurs.push('Liste des élèves manquante');
  if (!D.devoirs) erreurs.push('Liste des devoirs manquante');
  if (!D.notes) erreurs.push('Liste des notes manquante');
  
  const notesOrphelines = D.notes.filter(n => !D.eleves.find(e => e.id === n.eleveId) || !D.devoirs.find(d => d.id === n.devoirId));
  if (notesOrphelines.length > 0) erreurs.push(`${notesOrphelines.length} notes orphelines`);
  
  if (erreurs.length === 0) {
    toast('✅ Système intègre, aucune anomalie détectée', 'ok');
  } else {
    toast(`⚠️ ${erreurs.length} problème(s) détecté(s)`, 'warn');
    console.warn(erreurs);
  }
}

function importerCSVEleves() {
  const csv = document.getElementById('csv-eleves').value;
  if (!csv) return toast('Aucune donnée', 'err');
  
  const lignes = csv.split('\n');
  let ajoutes = 0;
  
  lignes.forEach(ligne => {
    const parts = ligne.trim().split(',');
    if (parts.length < 2) return;
    const nom = parts[0].trim().toUpperCase();
    const prenom = parts[1].trim();
    if (!nom || !prenom) return;
    
    if (!D.eleves.some(e => e.nom === nom && e.prenom === prenom)) {
      D.eleves.push({
        id: nid(D.eleves),
        nom,
        prenom,
        email: parts[2]?.trim() || '',
        classe: parts[3]?.trim() || '',
        mdp: '',
        parentMdp: '',
        doneAgenda: []
      });
      ajoutes++;
    }
  });
  
  markUnsaved();
  buildDropdowns();
  logAction(`Import CSV: ${ajoutes} élèves ajoutés`, 'success');
  toast(`✅ ${ajoutes} élèves importés`);
  navigate('admin_eleves');
}

function importerCSVDevoirs() {
  const csv = document.getElementById('csv-devoirs').value;

  const lignes = csv.split('\n');

  lignes.forEach(ligne => {
    const parts = ligne.trim().split(',');
    if (parts.length < 3) return;
    const titre = parts[0].trim();
    const date = parts[1].trim();
    const type = parts[2].trim();
    if (!titre || !date) return;
    
    D.devoirs.push({
      id: nid(D.devoirs),

      periode: parts[4]?.trim() || 'T1',

    });

// Envoyer un message avec pièce jointe
function sendMessageWithAttachment(convId, content, attachments = []) {
    if (!content?.trim() && attachments.length === 0) return false;
    const conv = D.conversations.find(c => c.id === convId);
    if (!conv) return false;
    
    const now = new Date();
    const message = {
        id: Date.now(),
        convId: convId,
        senderId: currentUser.id,
        senderName: currentRole === 'prof' ? `Prof. ${currentUser.prenom} ${currentUser.nom}` : 
                      currentRole === 'eleve' ? `${currentUser.prenom} ${currentUser.nom}` : 
                      `Parent de ${currentUser.prenom} ${currentUser.nom}`,
        content: content?.trim() || '',
        attachments: attachments,
        date: todayStr(),
        time: `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`,
        timestamp: now.getTime(),
        isPinned: false,
        isImportant: false,
        readBy: [currentUser.id]
    };
    
    D.messages_conv.push(message);
    conv.lastMessage = content?.trim().substring(0, 50) || (attachments.length ? '📎 Pièce jointe' : '');
    conv.lastMessageDate = `${todayStr()} ${message.time}`;
    conv.lastMessageSender = message.senderName;
    
    conv.participants.forEach(pId => {
        if (pId !== currentUser.id) {
            conv.unreadCount[pId] = (conv.unreadCount[pId] || 0) + 1;
        }
    });
    
    markUnsaved();
    return true;
}

// Envoyer une pièce jointe
function attachFile() {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = 'image/*,.pdf,.doc,.docx,.txt';
    input.multiple = true;
    input.onchange = async (e) => {
        const files = Array.from(e.target.files);
        const attachments = [];
        
        for (const file of files) {
            const reader = new FileReader();
            const attachment = await new Promise((resolve) => {
                reader.onload = (e) => {
                    resolve({
                        name: file.name,
                        type: file.type,
                        size: file.size,
                        data: e.target.result,
                        preview: file.type.startsWith('image/') ? e.target.result : null
                    });
                };
                reader.readAsDataURL(file);
            });
            attachments.push(attachment);
        }
        
        if (attachments.length > 0 && currentOpenConvId) {
            sendMessageWithAttachment(currentOpenConvId, '', attachments);
            openConversation(currentOpenConvId);
            toast(`📎 ${attachments.length} fichier(s) attaché(s)`);
        }
    };
    input.click();
}

// Ouvrir une pièce jointe
function openAttachment(attachment) {
    if (attachment.preview) {
        openModal('📎 Aperçu', `<img src="${attachment.data}" style="max-width: 100%; border-radius: var(--r);">`, null, 'Fermer');
    } else {
        const a = document.createElement('a');
        a.href = attachment.data;
        a.download = attachment.name;
        a.click();
    }
}

function searchConversations() {
    const searchTerm = conversationSearchTerm.toLowerCase();
    const conversations = getUserConversationsList();
    
    const filtered = conversations.filter(conv => {
        const otherId = conv.participants.find(p => p !== currentUser.id);
        const other = getParticipantInfo(otherId);
        const messages = getConvMessages(conv.id);
        
        return other?.displayName?.toLowerCase().includes(searchTerm) ||
               conv.lastMessage?.toLowerCase().includes(searchTerm) ||
               messages.some(m => m.content?.toLowerCase().includes(searchTerm));
    });
    
    renderConversationList(filtered);
}

    if (conversations.length === 0) {
        container.innerHTML = `<div class="empty" style="padding: 40px;">
            <i class="fas fa-comments" style="font-size: 48px; opacity: 0.5;"></i>
            <p style="margin-top: 12px;">${conversationSearchTerm ? 'Aucun résultat' : 'Aucune conversation'}</p>
            ${!conversationSearchTerm ? '<button class="btn btn-p" style="margin-top: 16px;" onclick="startNewConversation()"><i class="fas fa-plus"></i> Nouvelle conversation</button>' : ''}
        </div>`;
        return;
    }
    
    container.innerHTML = conversations.map(conv => {
        const otherId = conv.participants.find(p => p !== currentUser.id);

        const avatarClass = other?.role === 'prof' ? 'prof' : (other?.role === 'parent' ? 'parent' : 'eleve');
        const avatarIcon = other?.role === 'prof' ? 'fa-chalkboard-user' : 'fa-user-graduate';
        
        return `<div class="conversation-item" style="display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-bottom: 1px solid var(--border2); cursor: pointer; background: ${unread > 0 ? 'var(--pdim)' : 'transparent'};" onclick="openConversation(${conv.id})">
            <div class="conversation-avatar ${avatarClass}" style="background: linear-gradient(135deg, var(--primary), var(--primary2));">
                <i class="fas ${avatarIcon}" style="font-size: 20px;"></i>
            </div>
            <div class="conversation-preview">
                <div class="conversation-name">
                    ${esc(other?.displayName || 'Utilisateur')}
                    ${conv.lastMessageSender && conv.lastMessageSender !== currentUser.id ? `<span style="font-size: 10px; color: var(--text3);">· ${esc(conv.lastMessageSender.split(' ')[0])}</span>` : ''}
                </div>
                <div class="conversation-last-msg">

                </div>
            </div>
            <div class="conversation-time">${conv.lastMessageDate || ''}</div>
            ${unread > 0 ? `<div class="conversation-unread">${unread > 9 ? '9+' : unread}</div>` : ''}
        </div>`;
    }).join('');
}

// Nouvelle version de openConversation avec toutes les améliorations
function openConversation(convId) {
    currentOpenConvId = convId;
    markConversationRead(convId);
    const conv = D.conversations.find(c => c.id === convId);
    if (!conv) return;
    
    const otherId = conv.participants.find(p => p !== currentUser.id);
    const other = getParticipantInfo(otherId);
    const messages = getConvMessages(convId);
    const pinnedMsgs = messages.filter(m => m.isPinned);
    
    const messagesHtml = messages.map(msg => {
        const isMine = msg.senderId === currentUser.id;
        const attachmentsHtml = msg.attachments?.map(att => `
            <div class="message-attachment" onclick="openAttachment(${JSON.stringify(att).replace(/"/g, '&quot;')})">
                <i class="fas ${att.type.startsWith('image/') ? 'fa-image' : 'fa-paperclip'}"></i>
                <span class="message-attachment-name">${esc(att.name)}</span>
                <span style="font-size: 10px;">(${Math.round(att.size/1024)} KB)</span>
            </div>
        `).join('') || '';
        
        return `<div class="message-bubble ${isMine ? 'mine' : 'theirs'}">
            <div class="message-content ${isMine ? 'mine' : 'theirs'}">
                ${msg.content ? esc(msg.content).replace(/\n/g, '<br>') : ''}
                ${attachmentsHtml}
            </div>
            <div class="message-meta ${isMine ? 'message-mine' : 'message-theirs'}">
                ${!isMine ? `<span style="font-size: 10px;">${esc(msg.senderName)}</span>` : ''}
                <span>${msg.time}</span>
                ${msg.isImportant ? '<i class="fas fa-star" style="color: var(--yellow); font-size: 10px;"></i>' : ''}
                <div class="message-actions">
                    <button class="message-action-btn" onclick="toggleImportantMessage(${msg.id})" title="Marquer important">
                        <i class="fas fa-star${msg.isImportant ? '' : '-o'}"></i>
                    </button>
                    <button class="message-action-btn" onclick="togglePinMessage(${msg.id})" title="Épingler">
                        <i class="fas fa-thumbtack${msg.isPinned ? '' : ' fa-rotate-45'}"></i>
                    </button>
                    <button class="message-action-btn" onclick="replyToMessage(${msg.id})" title="Répondre">
                        <i class="fas fa-reply"></i>
                    </button>
                </div>
            </div>
        </div>`;
    }).join('');
    
    const pinnedHtml = pinnedMsgs.length > 0 ? `
        <div class="pinned-message" onclick="scrollToMessage(${pinnedMsgs[0].id})">
            <i class="fas fa-thumbtack fa-rotate-45" style="margin-right: 6px;"></i>
            <strong>Message épinglé :</strong> ${esc(pinnedMsgs[0].content?.substring(0, 100) || '')}
        </div>
    ` : '';
    
    const quickRepliesHtml = `<div class="quick-replies">
        ${quickTemplates[currentRole]?.map(t => `
            <span class="quick-reply" onclick="insertQuickReply('${t.text.replace(/'/g, "\\'")}')">
                ${t.icon} ${t.text.substring(0, 30)}${t.text.length > 30 ? '...' : ''}
            </span>
        `).join('')}
    </div>`;
    
    const emojiPickerHtml = `<div id="emoji-picker" class="emoji-picker">
        ${quickEmojis.map(emoji => `<span onclick="addEmoji('${emoji}')">${emoji}</span>`).join('')}
    </div>`;
    
    openModal(`💬 ${other?.displayName || 'Conversation'}`, `
        <div class="message-search">
            <i class="fas fa-search"></i>
            <input type="text" id="conv-search" placeholder="Rechercher dans les messages..." oninput="searchInConversation(this.value)">
        </div>
        <div id="typing-indicator" class="typing-indicator" style="display: none;">
            <span>${other?.displayName?.split(' ')[0] || 'Quelqu\'un'}</span>
            <span class="typing-dot"></span>
            <span class="typing-dot"></span>
            <span class="typing-dot"></span>
        </div>
        ${pinnedHtml}
        <div style="height: 400px; display: flex; flex-direction: column;">
            <div id="conv-messages-container" style="flex: 1; overflow-y: auto; padding: 16px; background: var(--bg); border-radius: var(--r); margin-bottom: 12px;">
                ${messages.length === 0 ? '<div class="empty" style="padding: 40px;"><i class="fas fa-comment-dots"></i><p>Aucun message</p><p style="font-size: 11px;">Envoyez un message pour démarrer la conversation</p></div>' : messagesHtml}
                <div id="conv-messages-end"></div>
            </div>
            ${quickRepliesHtml}
            <div class="message-input-wrapper">
                <textarea id="conv-msg-input" rows="1" placeholder="Écrivez votre message..." oninput="autoResizeTextarea(this); sendTypingIndicator(${convId})" onkeydown="if(event.key==='Enter' && !event.shiftKey){event.preventDefault();sendCurrentMessage()}"></textarea>
                <div class="message-input-actions">
                    <button class="message-input-btn emoji-btn" onclick="toggleEmojiPicker()" title="Emojis">
                        <i class="fas fa-smile"></i>
                    </button>
                    <button class="message-input-btn" onclick="attachFile()" title="Pièce jointe">
                        <i class="fas fa-paperclip"></i>
                    </button>
                    <button class="message-input-btn" style="background: var(--primary); border-color: var(--primary);" onclick="sendCurrentMessage()">
                        <i class="fas fa-paper-plane" style="color: white;"></i>
                    </button>
                </div>
            </div>
            ${emojiPickerHtml}
        </div>
    `, () => { currentOpenConvId = null; }, 'Fermer');
    
    setTimeout(() => {
        const textarea = document.getElementById('conv-msg-input');
        if (textarea) textarea.focus();
        autoResizeTextarea(textarea);
        document.getElementById('conv-messages-end')?.scrollIntoView({ behavior: 'smooth' });
    }, 100);
}

// Fonctions auxiliaires
function autoResizeTextarea(textarea) {
    if (textarea) {
        textarea.style.height = 'auto';
        textarea.style.height = Math.min(textarea.scrollHeight, 120) + 'px';
    }
}

function insertQuickReply(text) {
    const input = document.getElementById('conv-msg-input');
    if (input) {
        input.value = text;
        input.focus();
        autoResizeTextarea(input);
    }
}

function searchInConversation(searchTerm) {
    const container = document.getElementById('conv-messages-container');
    if (!container) return;
    
    const messages = container.querySelectorAll('.message-bubble');
    let foundCount = 0;
    
    messages.forEach(msg => {
        const content = msg.querySelector('.message-content')?.innerText || '';
        if (searchTerm && content.toLowerCase().includes(searchTerm.toLowerCase())) {
            msg.style.backgroundColor = 'var(--ydim)';
            msg.style.borderRadius = '12px';
            foundCount++;
        } else {
            msg.style.backgroundColor = '';
        }
    });
    
    if (searchTerm && foundCount > 0) {
        const firstMatch = Array.from(messages).find(m => m.style.backgroundColor);
        firstMatch?.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
}

function scrollToMessage(messageId) {
    const msgElement = document.getElementById(`msg-${messageId}`);
    if (msgElement) {
        msgElement.scrollIntoView({ behavior: 'smooth', block: 'center' });
        msgElement.style.transition = 'background 0.3s';
        msgElement.style.background = 'var(--ydim)';
        setTimeout(() => {
            msgElement.style.background = '';
        }, 2000);
    }
}

function replyToMessage(messageId) {
    const msg = D.messages_conv.find(m => m.id === messageId);
    if (msg && msg.content) {
        const input = document.getElementById('conv-msg-input');
        if (input) {
            input.value = `> ${msg.content.substring(0, 100)}${msg.content.length > 100 ? '...' : ''}\n\n`;
            input.focus();
            autoResizeTextarea(input);
            toast('💬 Réponse préparée');
        }
    }
}

// Version améliorée de sendCurrentMessage
function sendCurrentMessage() {
    const input = document.getElementById('conv-msg-input');
    if (!input?.value.trim()) return;
    
    if (sendMessageTo(currentOpenConvId, input.value)) {
        input.value = '';
        autoResizeTextarea(input);
        openConversation(currentOpenConvId);
        toast('✅ Message envoyé');
    } else {
        toast('❌ Erreur d\'envoi', 'err');
    }
}

// Mettre à jour updateConvBadge
function updateConvBadge() {
    const total = getTotalUnreadCount();
    const badges = document.querySelectorAll('#nv_conversations .nav-badge, #nv_e_conversations .nav-badge, #nv_p_conversations .nav-badge');
    badges.forEach(badge => {
        if (total > 0) {
            badge.textContent = total;
            badge.style.display = '';
        } else {
            badge.style.display = 'none';
        }
    });
}

// Améliorer startNewConversation
function startNewConversation() {
    let options = [];
    if (currentRole === 'prof') {
        options = D.eleves.map(e => ({ id: e.id, name: `${e.nom} ${e.prenom}`, role: 'eleve', avatar: 'fa-user-graduate' }));
        D.eleves.forEach(e => {
            if (e.parentNom || e.parentPrenom) {
                options.push({ id: e.id, name: `${e.parentPrenom || ''} ${e.parentNom || e.nom}`.trim(), role: 'parent', avatar: 'fa-user-friends' });
            }
        });
    } else if (currentRole === 'eleve' || currentRole === 'parent') {
        options = [{ id: D.prof.id, name: `Prof. ${D.prof.prenom} ${D.prof.nom}`, role: 'prof', avatar: 'fa-chalkboard-user' }];
    }
    
    const existingIds = getUserConversationsList().flatMap(c => c.participants);
    const available = options.filter(opt => !existingIds.includes(opt.id));
    
    if (available.length === 0) return toast('Aucun nouveau contact disponible', 'info');
    
    openModal('💬 Nouvelle conversation', `
        <div class="mf"><label>Destinataire</label>
            <select id="new-conv-dest">
                ${available.map(opt => `<option value="${opt.id}" data-role="${opt.role}">${opt.name}</option>`).join('')}
            </select>
        </div>
        <div class="mf"><label>Message</label>
            <textarea id="new-conv-msg" rows="4" placeholder="Bonjour..."></textarea>
        </div>
        <div class="quick-replies" style="margin-top: 8px;">
            ${quickTemplates[currentRole]?.slice(0, 3).map(t => `
                <span class="quick-reply" onclick="document.getElementById('new-conv-msg').value = '${t.text.replace(/'/g, "\\'")}'">
                    ${t.icon} ${t.text.substring(0, 25)}...
                </span>
            `).join('')}
        </div>
    `, () => {
        const destId = parseInt(document.getElementById('new-conv-dest').value);
        const content = document.getElementById('new-conv-msg').value.trim();
        if (!content) return toast('Message vide', 'err');
        const conv = getOrCreateConversation(currentUser.id, destId, '');
        if (sendMessageTo(conv.id, content)) {
            toast('✅ Conversation démarrée');
            navigate('conversations');
            setTimeout(() => openConversation(conv.id), 300);
        } else toast('❌ Erreur', 'err');
    });
}

let currentWhatsappConvId = null;
let whatsappTypingTimeout = null;
let whatsappIsTyping = false;

// Liste des emojis
const whatsappEmojis = ['😀', '😊', '😂', '❤️', '👍', '🎉', '😢', '😡', '🥰', '😎', '🤔', '🙏', '💪', '🎓', '📚', '⭐', '✅', '🔥', '👏', '🎯'];

// Modèles de messages rapides
const whatsappQuickTemplates = {
    prof: ['📝 Bon travail !', '⚠️ À réviser', '📚 Devoir pour la prochaine fois', '👏 Félicitations !', '📢 Rappel important'],
    eleve: ['🙏 Pouvez-vous m\'aider ?', '📚 Je n\'ai pas compris', '📝 Quand est le devoir ?', '⭐ Merci !', '❓ Question'],

};

function rWhatsappMessagerie() {
    const conversations = getUserConversationsList();

    return `
    <div class="page-header">
        <div class="page-title">

    <div class="whatsapp-container">
        <!-- Sidebar conversations -->
        <div class="whatsapp-sidebar">
            <div class="whatsapp-sidebar-header">
                <h3>Discussions</h3>

                    <input type="text" id="whatsapp-search" placeholder="Rechercher..." oninput="filterWhatsappConversations(this.value)">

function renderWhatsappConversationsList(conversations) {
    if (conversations.length === 0) {
        return `<div class="empty" style="padding: 40px;">
            <i class="fas fa-comments" style="font-size: 48px; opacity: 0.5;"></i>
            <p style="margin-top: 12px;">Aucune conversation</p>
            <button class="btn btn-p" style="margin-top: 16px;" onclick="startWhatsappConversation()">
                <i class="fas fa-plus"></i> Démarrer
            </button>
        </div>`;
    }
    
    return conversations.map(conv => {
        const otherId = conv.participants.find(p => p !== currentUser.id);
        const other = getParticipantInfo(otherId);
        const unread = conv.unreadCount[currentUser.id] || 0;
        const avatarClass = other?.role === 'prof' ? 'prof' : (other?.role === 'parent' ? 'parent' : 'eleve');
        const avatarIcon = other?.role === 'prof' ? '👨‍🏫' : (other?.role === 'parent' ? '👨‍👩‍👧' : '👨‍🎓');
        
        // Formater l'heure du dernier message
        let lastTime = '';
        if (conv.lastMessageDate) {
            const parts = conv.lastMessageDate.split(' ');
            if (parts[1]) lastTime = parts[1];
            else lastTime = parts[0];
        }
        
        return `
        <div class="whatsapp-conversation ${unread > 0 ? 'unread' : ''} ${currentWhatsappConvId === conv.id ? 'active' : ''}" 
             onclick="openWhatsappConversation(${conv.id})">
            <div class="whatsapp-avatar ${avatarClass}">
                ${avatarIcon}
            </div>
            <div class="whatsapp-conv-info">
                <div class="whatsapp-conv-name">
                    ${esc(other?.displayName || 'Utilisateur')}
                </div>
                <div class="whatsapp-conv-lastmsg">
                    ${conv.lastMessage ? esc(conv.lastMessage) : 'Aucun message'}
                </div>
            </div>
            <div class="whatsapp-conv-time">
                ${lastTime}
            </div>
            ${unread > 0 ? `<div class="whatsapp-unread-badge">${unread > 9 ? '9+' : unread}</div>` : ''}
        </div>`;
    }).join('');
}

function renderWhatsappEmptyState() {
    return `
    <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; text-align: center; padding: 40px;">
        <i class="fas fa-comment-dots" style="font-size: 64px; color: var(--text3); opacity: 0.5; margin-bottom: 20px;"></i>
        <h3 style="margin-bottom: 8px;">Sélectionnez une conversation</h3>
        <p style="color: var(--text2); font-size: 13px;">Choisissez une discussion pour commencer à échanger</p>
        <button class="btn btn-p" style="margin-top: 20px;" onclick="startWhatsappConversation()">
            <i class="fas fa-plus"></i> Nouvelle conversation
        </button>
    </div>`;
}

function renderWhatsappChat(convId) {
    const conv = D.conversations.find(c => c.id === convId);
    if (!conv) return renderWhatsappEmptyState();
    
    const otherId = conv.participants.find(p => p !== currentUser.id);
    const other = getParticipantInfo(otherId);
    const messages = getConvMessages(convId);
    const avatarClass = other?.role === 'prof' ? 'prof' : (other?.role === 'parent' ? 'parent' : 'eleve');
    const avatarIcon = other?.role === 'prof' ? '👨‍🏫' : (other?.role === 'parent' ? '👨‍👩‍👧' : '👨‍🎓');
    
    // Grouper les messages par date
    const groupedMessages = {};
    messages.forEach(msg => {
        if (!groupedMessages[msg.date]) groupedMessages[msg.date] = [];
        groupedMessages[msg.date].push(msg);
    });
    
    const messagesHtml = Object.keys(groupedMessages).sort((a,b) => {
        const [da, ma] = a.split('/');
        const [db, mb] = b.split('/');
        return (parseInt(ma)*100 + parseInt(da)) - (parseInt(mb)*100 + parseInt(db));
    }).map(date => {
        const dateObj = new Date();
        dateObj.setDate(parseInt(date.split('/')[0]));
        dateObj.setMonth(parseInt(date.split('/')[1]) - 1);
        const dateLabel = date === todayStr() ? "Aujourd'hui" : 
                          date === yesterdayStr() ? "Hier" : 
                          `${date.split('/')[0]}/${date.split('/')[1]}`;
        
        return `
        <div class="whatsapp-date-divider">
            <span>${dateLabel}</span>
        </div>
        ${groupedMessages[date].map(msg => {
            const isMine = msg.senderId === currentUser.id;
            return `
            <div class="whatsapp-message ${isMine ? 'mine' : 'theirs'}">
                <div class="whatsapp-message-bubble">
                    <div class="whatsapp-message-text">${esc(msg.content).replace(/\n/g, '<br>')}</div>
                    <div class="whatsapp-message-time">
                        ${msg.time}
                        ${isMine ? '<span class="whatsapp-message-status"><i class="fas fa-check"></i></span>' : ''}
                        <div class="whatsapp-message-actions">
